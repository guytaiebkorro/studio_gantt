<html lang="en">
<head>

<title>Gantt</title>

<style>
  /* ============================================================
     THEME TOKENS
     Default = "Cyberpunk neon" dark hacker theme.
     [data-theme="light"] on <html> swaps to a clean light theme.
     ============================================================ */
  :root {
    /* geometry (theme-independent) */
    --row-h: 38px;
    --header-h: 52px;
    --list-w: 300px;
    --ctrl-h: 32px;   /* shared height for all toolbar buttons & fields */
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

    /* --- dark: slate grey-blue with cool blue/cyan accents (default) --- */
    --font: var(--font-mono);
    --bg: #0b1220;
    --bg-glow-1: rgba(56,189,248,.05);
    --bg-glow-2: rgba(34,211,238,.04);
    --panel: #111a2b;
    --panel-2: #1b263b48;
    --border: #243349;
    --border-strong: #33445e;
    --text: #cdd9ec;
    --muted: #6b7c99;
    --accent: #38bdf8;            /* sky blue */
    --accent-hover: #7dd3fc;
    --accent-text: #06121f;       /* text on accent fills */
    --accent-2: #22d3ee;          /* cyan (today-line / secondary) */
    --grid: #18233a;
    --grid-strong: #243349;
    --weekend: #0e1626;
    --today: rgba(34,211,238,.10);
    --today-line: #22d3ee;

    --btn-bg: #16223a;
    --btn-hover: #1e2d49;
    --input-bg: #0d1626;
    --hover: #18233a;
    --group-bg: #131e33;
    --drop: #1b2a47;
    --modal-bg: #111a2b;
    --overlay: rgba(4,8,16,.72);
    --toast-bg: #16223a;
    --chip-bg: #16223a;
    --dep: #54648a;

    --danger: #fb7185;
    --danger-border: #4a2330;
    --danger-bg: #2a1018;
    --ok: #34d399;
    --ok-bg: #08251f;
    --ok-text: #5eead4;
    --err-bg: #2a1018;
    --err-text: #fb7185;
    --warn-bg: #221a05;
    --warn-text: #ffcf66;
    --warn-border: #5a4a14;

    --shadow: 0 0 0 1px rgba(56,189,248,.04), 0 8px 24px rgba(0,0,0,.55);
    --glow-accent: 0 0 10px rgba(56,189,248,.50);
    --glow-accent-2: 0 0 10px rgba(34,211,238,.50);
    --bar-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 0 14px rgba(0,0,0,.5);
    --text-glow: 0 0 8px rgba(56,189,248,.40);
  }

  :root[data-theme="light"] {
    /* font intentionally NOT overridden — both themes share --font-mono so the
       toolbar/layout stays identical when toggling. */
    --bg: #f4f6f9;
    --bg-glow-1: transparent;
    --bg-glow-2: transparent;
    --panel: #ffffff;
    --panel-2: #fbfcfe;
    --border: #d9dee6;
    --border-strong: #b9c2cf;
    --text: #1f2733;
    --muted: #6b7689;
    --accent: #3b82f6;
    --accent-hover: #2f74e0;
    --accent-text: #ffffff;
    --accent-2: #f59e0b;
    --grid: #eef1f5;
    --grid-strong: #e1e6ee;
    --weekend: #f7f9fc;
    --today: #fff5e6;
    --today-line: #f59e0b;

    --btn-bg: #ffffff;
    --btn-hover: #f1f4f9;
    --input-bg: #ffffff;
    --hover: #f5f8fd;
    --group-bg: #fbfcfe;
    --drop: #e8f0fe;
    --modal-bg: #ffffff;
    --overlay: rgba(16,24,40,.35);
    --toast-bg: #1f2733;
    --chip-bg: #f1f4f9;
    --dep: #94a3b8;

    --danger: #e11d48;
    --danger-border: #f3b5c2;
    --danger-bg: #fff1f4;
    --ok: #10b981;
    --ok-bg: #e7f7f0;
    --ok-text: #0a7a52;
    --err-bg: #fdecef;
    --err-text: #b4243a;
    --warn-bg: #fff8e1;
    --warn-text: #7a5b00;
    --warn-border: #f0e0a8;

    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
    --glow-accent: none;
    --glow-accent-2: none;
    --bar-shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
    --text-glow: none;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: var(--font);
    color: var(--text); background: var(--bg);
    font-size: 13px; overflow: hidden;
  }
  /* atmospheric neon wash (dark theme only; transparent in light) */
  body::before {
    content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(900px 600px at 12% -10%, var(--bg-glow-1), transparent 60%),
      radial-gradient(900px 600px at 110% 120%, var(--bg-glow-2), transparent 60%);
  }
  #app { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }

  /* ---------- Toolbar ---------- */
  #toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 12px; background: var(--panel);
    border-bottom: 1px solid var(--border); box-shadow: var(--shadow); z-index: 30;
  }
  #toolbar .title {
    font-weight: 700; font-size: 15px; margin-right: 6px;
    color: var(--accent); text-shadow: var(--text-glow); letter-spacing: .04em;
  }
  #toolbar .spacer { flex: 1; }
  .board-select {
    height: var(--ctrl-h); font-size: 12.5px; font-family: inherit; color: var(--text); background: var(--input-bg);
    border: 1px solid var(--border-strong); border-radius: 7px; padding: 0 8px; max-width: 200px;
  }
  .btn {
    height: var(--ctrl-h); border: 1px solid var(--border-strong); background: var(--btn-bg); color: var(--text);
    padding: 0 11px; border-radius: 7px; cursor: pointer; font-size: 12.5px; font-family: inherit;
    line-height: 1; display: inline-flex; align-items: center; gap: 6px; transition: box-shadow .15s, background .15s, border-color .15s;
  }
  .btn:hover { background: var(--btn-hover); border-color: var(--accent); box-shadow: var(--glow-accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: var(--accent-text); box-shadow: var(--glow-accent); font-weight: 600; }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: .5; cursor: default; box-shadow: none; }
  .seg { height: var(--ctrl-h); display: inline-flex; align-items: stretch; border: 1px solid var(--border-strong); border-radius: 7px; overflow: hidden; }
  .seg button {
    border: none; background: var(--btn-bg); padding: 0 12px; cursor: pointer; font-size: 12.5px; color: var(--text); font-family: inherit;
    border-left: 1px solid var(--border); display: inline-flex; align-items: center;
  }
  .seg button:first-child { border-left: none; }
  .seg button:hover { background: var(--btn-hover); }
  .seg button.active { background: var(--accent); color: var(--accent-text); }
  .dirty-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--danger); display: none;
    margin-left: 2px;
  }
  body.dirty .dirty-dot { display: inline-block; }
  .cloud-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); display: inline-block;
    margin-left: 2px; vertical-align: middle;
  }
  body.cloud-on .cloud-dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  body.cloud-on #save-btn { display: none; } /* autosave handles persistence */
  .c-status {
    font-size: 12.5px; padding: 8px 10px; border-radius: 7px; background: var(--chip-bg); color: var(--muted);
  }
  .c-status.ok { background: var(--ok-bg); color: var(--ok-text); }
  .c-status.err { background: var(--err-bg); color: var(--err-text); }

  #save-mode-banner {
    font-size: 12px; padding: 6px 12px; background: var(--warn-bg); color: var(--warn-text);
    border-bottom: 1px solid var(--warn-border); display: none;
  }
  #save-mode-banner.show { display: block; }

  /* ---------- Main split ---------- */
  #main { flex: 1; display: flex; overflow: hidden; position: relative; }
  #loading {
    position: absolute; inset: 0; background: var(--panel); z-index: 40;
    display: none; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px; letter-spacing: .02em;
  }
  #loading.show { display: flex; }

  /* left list */
  #list-pane {
    width: var(--list-w); flex: 0 0 var(--list-w); background: var(--panel);
    border-right: 1px solid var(--border-strong); display: flex; flex-direction: column;
    overflow: hidden;
  }
  #list-head {
    height: var(--header-h); flex: 0 0 var(--header-h);
    display: flex; align-items: center; padding: 0 12px; font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--border-strong); background: var(--panel);
  }
  #list-body { overflow: hidden; flex: 1; }
  #list-inner { position: relative; }
  .list-row {
    height: var(--row-h); display: flex; align-items: center; gap: 8px;
    padding: 0 12px; border-bottom: 1px solid var(--grid); cursor: pointer;
    white-space: nowrap; overflow: hidden;
  }
  .list-row:hover { background: var(--hover); }
  .list-row.group-head {
    font-weight: 700; background: var(--group-bg); color: var(--text); cursor: default;
    text-transform: uppercase; letter-spacing: .03em; font-size: 12px;
  }
  .list-row .caret {
    flex: 0 0 auto; width: 22px; text-align: center; cursor: pointer; color: var(--muted);
    font-size: 17px; line-height: 1; user-select: none; margin-left: -4px;
  }
  .list-row .caret:hover { color: var(--text); }
  .list-row.task-row { padding-left: 30px; cursor: grab; }
  .list-row.dragging { opacity: .4; }
  .list-row.drop-before { box-shadow: inset 0 2px 0 0 var(--accent); }
  .list-row.drop-after { box-shadow: inset 0 -2px 0 0 var(--accent); }
  .list-row.group-head.drop-into { background: var(--drop); box-shadow: inset 0 0 0 2px var(--accent); }
  .grp-add {
    flex: 0 0 auto; width: 20px; height: 20px; padding: 0; border-radius: 5px;
    border: 1px solid var(--border-strong); background: var(--btn-bg); color: var(--muted);
    font-size: 15px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .grp-add:hover { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  .swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .swatches .sw {
    width: 26px; height: 26px; border-radius: 6px; cursor: pointer; padding: 0;
    border: 2px solid transparent; box-shadow: 0 0 0 1px var(--border) inset;
  }
  .swatches .sw.sel { border-color: var(--text); }
  .toast-btn {
    margin-left: 12px; background: transparent; border: 1px solid rgba(255,255,255,.55);
    color: #fff; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-size: 12.5px;
  }
  .toast-btn:hover { background: rgba(255,255,255,.15); }
  .list-row .swatch { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
  .list-row .nm { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .list-row .meta { color: var(--muted); font-size: 11px; flex: 0 0 auto; }

  /* right chart */
  #chart-pane { flex: 1; overflow: auto; position: relative; background: var(--panel); }
  #chart-inner { position: relative; }
  #chart-header {
    position: sticky; top: 0; z-index: 20; height: var(--header-h);
    background: var(--panel); border-bottom: 1px solid var(--border-strong);
  }
  .hdr-cell {
    position: absolute; top: 0; height: var(--header-h);
    border-left: 1px solid var(--grid-strong); box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-size: 11px; color: var(--muted); overflow: hidden;
  }
  .hdr-cell .big { font-weight: 600; color: var(--text); font-size: 12px; }
  #chart-body { position: relative; }
  .grid-col {
    position: absolute; top: 0; bottom: 0; border-left: 1px solid var(--grid);
  }
  .grid-col.weekend { background: var(--weekend); }
  .grid-col.month-start { border-left: 1px solid var(--grid-strong); }
  .row-line {
    position: absolute; left: 0; right: 0; height: var(--row-h);
    border-bottom: 1px solid var(--grid);
  }
  .row-line.group { background: var(--group-bg); }
  #today-line {
    position: absolute; top: 0; bottom: 0; width: 2px; background: var(--today-line);
    box-shadow: var(--glow-accent-2); z-index: 6; pointer-events: none;
  }

  /* bars */
  .bar {
    position: absolute; height: 22px; border-radius: 6px; cursor: grab;
    box-shadow: var(--bar-shadow); overflow: hidden; user-select: none;
    display: flex; align-items: center; z-index: 8;
  }
  .bar:hover { filter: brightness(1.12) saturate(1.1); }
  .bar:active { cursor: grabbing; }
  .bar .fill { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,.35); }
  .bar .label {
    position: relative; padding: 0 8px; font-size: 11.5px; color: #fff; white-space: nowrap;
    text-shadow: 0 1px 1px rgba(0,0,0,.25); pointer-events: none; overflow: hidden; text-overflow: ellipsis;
  }
  .bar .handle {
    position: absolute; top: 0; bottom: 0; width: 7px; cursor: ew-resize; z-index: 2;
  }
  .bar .handle.l { left: 0; }
  .bar .handle.r { right: 0; }
  .bar.selected { outline: 2px solid var(--accent); outline-offset: 1px; box-shadow: var(--glow-accent), var(--bar-shadow); }
  /* rollup bar shown on a collapsed group's header row */
  .bar.group-summary {
    height: 10px; border-radius: 3px; opacity: .85; cursor: default; box-shadow: none;
  }
  .bar.group-summary::before,
  .bar.group-summary::after {
    content: ""; position: absolute; top: -3px; width: 3px; height: 16px;
    background: inherit; border-radius: 1px;
  }
  .bar.group-summary::before { left: 0; }
  .bar.group-summary::after  { right: 0; }

  .milestone {
    position: absolute; width: 18px; height: 18px; transform: rotate(45deg);
    border-radius: 3px; cursor: grab; z-index: 9; box-shadow: var(--shadow);
    border: 2px solid rgba(255,255,255,.8);
  }
  .milestone.selected { outline: 2px solid var(--accent); outline-offset: 2px; box-shadow: var(--glow-accent); }
  .ms-label {
    position: absolute; font-size: 11px; color: var(--text); white-space: nowrap;
    pointer-events: none; z-index: 9;
  }

  /* dependency arrows */
  #dep-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 7; overflow: visible; }
  #dep-svg > path { stroke: var(--dep); stroke-width: 1.6; fill: none; stroke-linejoin: round; stroke-linecap: round; }
  #dep-svg marker path { fill: var(--dep); stroke: none; }

  /* ---------- Modal / editor ---------- */
  .overlay {
    position: fixed; inset: 0; background: var(--overlay); z-index: 100;
    display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--modal-bg); color: var(--text); border-radius: 12px; width: 420px; max-width: calc(100vw - 32px);
    max-height: calc(100vh - 48px); overflow: auto;
    border: 1px solid var(--border-strong);
    box-shadow: 0 20px 60px rgba(0,0,0,.55), var(--glow-accent);
  }
  .modal h3 { margin: 0; padding: 16px 18px; border-bottom: 1px solid var(--border); font-size: 15px; }
  .modal .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 600; }
  .modal input[type=text], .modal input[type=date], .modal input[type=number], .modal select {
    width: 100%; padding: 8px 9px; border: 1px solid var(--border-strong); border-radius: 7px;
    font-size: 13px; font-family: inherit; background: var(--input-bg); color: var(--text);
  }
  .modal input:focus, .modal select:focus {
    outline: none; border-color: var(--accent); box-shadow: var(--glow-accent);
  }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }
  .check { display: flex; align-items: center; gap: 8px; }
  .check input { width: 16px; height: 16px; }
  .dep-list { display: flex; flex-direction: column; gap: 6px; max-height: 140px; overflow: auto;
    border: 1px solid var(--border); border-radius: 7px; padding: 8px; }
  .dep-list .d { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .modal .foot { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .modal .foot .left { margin-right: auto; }
  .danger { color: var(--danger); border-color: var(--danger-border); }
  .danger:hover { background: var(--danger-bg); border-color: var(--danger); box-shadow: 0 0 10px rgba(255,77,109,.4); }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row input[type=range] { flex: 1; }
  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--toast-bg); color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 13px;
    border: 1px solid var(--border-strong); box-shadow: var(--glow-accent);
    z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ---------- View-only (locked) mode ---------- */
  #lock-btn.locked { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn-text); }
  #lock-btn.editing { background: var(--ok); border-color: var(--ok); color: var(--accent-text); box-shadow: 0 0 10px var(--ok); }
  /* hide every editing affordance while locked */
  body.locked #add-task, body.locked #add-milestone, body.locked #add-group,
  body.locked #board-new, body.locked #import-btn, body.locked #save-btn,
  body.locked #f-save, body.locked #f-delete, body.locked #f-duplicate,
  body.locked #c-savenow, body.locked #c-create, body.locked #c-rename, body.locked #c-delete { display: none !important; }
  /* the editor opens read-only while locked */
  body.locked #editor-overlay .body input,
  body.locked #editor-overlay .body select,
  body.locked #editor-overlay .body .swatches { pointer-events: none; opacity: .65; }
  body.locked .bar, body.locked .milestone { cursor: default; }
  body.locked .bar .handle { display: none; }
  body.locked .list-row.task-row { cursor: pointer; }

  /* ---------- Cyberpunk finishing touches ---------- */
  /* neon hairline under the toolbar */
  #toolbar { border-bottom: 1px solid var(--accent); box-shadow: 0 1px 0 var(--accent), var(--shadow); }
  :root[data-theme="light"] #toolbar { box-shadow: var(--shadow); border-bottom: 1px solid var(--border); }

  /* themed scrollbars */
  * { scrollbar-color: var(--border-strong) transparent; scrollbar-width: thin; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); background-clip: content-box; }

  /* theme toggle button keeps its glow subtle */
  #theme-btn { font-size: 14px; }
</style>
<script>
  /* Apply the saved theme before first paint to avoid a flash.
     Default is the clean light theme; only an explicit saved "dark" keeps
     the dark cyberpunk base (no attribute). */
  try {
    if (localStorage.getItem("gantt_theme_v1") !== "dark")
      document.documentElement.setAttribute("data-theme", "light");
  } catch (_) {}
</script>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">📊 Gantt</span>
    <select id="board-select" class="board-select" title="Switch board"></select>
    <button class="btn" id="board-new" title="Create a new board">＋ Board</button>
    <button class="btn" id="refresh-btn" title="Pull the latest from the cloud">🔄</button>
    <span style="width:1px; height:22px; background:var(--border); margin:0 2px;"></span>
    <button class="btn" id="add-task">+ Task</button>
    <button class="btn" id="add-milestone">+ Milestone</button>
    <button class="btn" id="add-group">+ Group</button>
    <div class="seg" id="view-seg">
      <button data-view="day">Day</button>
      <button data-view="week">Week</button>
      <button data-view="month">Month</button>
    </div>
    <button class="btn" id="today-btn">Today</button>
    <span class="spacer"></span>
    <button class="btn" id="theme-btn" title="Toggle dark / light theme">🌙</button>
    <button class="btn" id="lock-btn" title="Read-only — click to start editing">🔒 View only</button>
    <button class="btn" id="cloud-btn">☁ Cloud <span class="cloud-dot"></span></button>

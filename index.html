<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gantt</title>
<style>
  :root {
    --bg: #f4f6f9;
    --panel: #ffffff;
    --border: #d9dee6;
    --border-strong: #b9c2cf;
    --text: #1f2733;
    --muted: #6b7689;
    --accent: #3b82f6;
    --grid: #eef1f5;
    --grid-strong: #e1e6ee;
    --weekend: #f7f9fc;
    --today: #fff5e6;
    --today-line: #f59e0b;
    --row-h: 38px;
    --header-h: 52px;
    --list-w: 300px;
    --shadow: 0 1px 3px rgba(16,24,40,.08), 0 1px 2px rgba(16,24,40,.06);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text); background: var(--bg);
    font-size: 13px; overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ---------- Toolbar ---------- */
  #toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 12px; background: var(--panel);
    border-bottom: 1px solid var(--border); box-shadow: var(--shadow); z-index: 30;
  }
  #toolbar .title { font-weight: 700; font-size: 15px; margin-right: 6px; }
  #toolbar .spacer { flex: 1; }
  .btn {
    border: 1px solid var(--border-strong); background: #fff; color: var(--text);
    padding: 6px 11px; border-radius: 7px; cursor: pointer; font-size: 12.5px;
    line-height: 1; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: #f1f4f9; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #2f74e0; }
  .btn:disabled { opacity: .5; cursor: default; }
  .seg { display: inline-flex; border: 1px solid var(--border-strong); border-radius: 7px; overflow: hidden; }
  .seg button {
    border: none; background: #fff; padding: 6px 12px; cursor: pointer; font-size: 12.5px; color: var(--text);
    border-left: 1px solid var(--border);
  }
  .seg button:first-child { border-left: none; }
  .seg button.active { background: var(--accent); color: #fff; }
  .dirty-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #e11d48; display: none;
    margin-left: 2px;
  }
  body.dirty .dirty-dot { display: inline-block; }
  .cloud-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #cbd2dd; display: inline-block;
    margin-left: 2px; vertical-align: middle;
  }
  body.cloud-on .cloud-dot { background: #10b981; }
  .c-status {
    font-size: 12.5px; padding: 8px 10px; border-radius: 7px; background: #f1f4f9; color: var(--muted);
  }
  .c-status.ok { background: #e7f7f0; color: #0a7a52; }
  .c-status.err { background: #fdecef; color: #b4243a; }

  #save-mode-banner {
    font-size: 12px; padding: 6px 12px; background: #fff8e1; color: #7a5b00;
    border-bottom: 1px solid #f0e0a8; display: none;
  }
  #save-mode-banner.show { display: block; }

  /* ---------- Main split ---------- */
  #main { flex: 1; display: flex; overflow: hidden; }

  /* left list */
  #list-pane {
    width: var(--list-w); flex: 0 0 var(--list-w); background: var(--panel);
    border-right: 1px solid var(--border-strong); display: flex; flex-direction: column;
    overflow: hidden;
  }
  #list-head {
    height: var(--header-h); flex: 0 0 var(--header-h);
    display: flex; align-items: center; padding: 0 12px; font-weight: 600; color: var(--muted);
    border-bottom: 1px solid var(--border-strong); background: var(--panel);
  }
  #list-body { overflow: hidden; flex: 1; }
  #list-inner { position: relative; }
  .list-row {
    height: var(--row-h); display: flex; align-items: center; gap: 8px;
    padding: 0 12px; border-bottom: 1px solid var(--grid); cursor: pointer;
    white-space: nowrap; overflow: hidden;
  }
  .list-row:hover { background: #f5f8fd; }
  .list-row.group-head {
    font-weight: 700; background: #fbfcfe; color: var(--text); cursor: default;
  }
  .list-row.task-row { padding-left: 30px; cursor: grab; }
  .list-row.dragging { opacity: .4; }
  .list-row.drop-before { box-shadow: inset 0 2px 0 0 var(--accent); }
  .list-row.drop-after { box-shadow: inset 0 -2px 0 0 var(--accent); }
  .list-row.group-head.drop-into { background: #e8f0fe; box-shadow: inset 0 0 0 2px var(--accent); }
  .grp-add {
    flex: 0 0 auto; width: 20px; height: 20px; padding: 0; border-radius: 5px;
    border: 1px solid var(--border-strong); background: #fff; color: var(--muted);
    font-size: 15px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .grp-add:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .swatches { display: flex; flex-wrap: wrap; gap: 6px; }
  .swatches .sw {
    width: 26px; height: 26px; border-radius: 6px; cursor: pointer; padding: 0;
    border: 2px solid transparent; box-shadow: 0 0 0 1px var(--border) inset;
  }
  .swatches .sw.sel { border-color: var(--text); }
  .toast-btn {
    margin-left: 12px; background: transparent; border: 1px solid rgba(255,255,255,.55);
    color: #fff; padding: 3px 10px; border-radius: 6px; cursor: pointer; font-size: 12.5px;
  }
  .toast-btn:hover { background: rgba(255,255,255,.15); }
  .list-row .swatch { width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto; }
  .list-row .nm { overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .list-row .meta { color: var(--muted); font-size: 11px; flex: 0 0 auto; }

  /* right chart */
  #chart-pane { flex: 1; overflow: auto; position: relative; background: var(--panel); }
  #chart-inner { position: relative; }
  #chart-header {
    position: sticky; top: 0; z-index: 20; height: var(--header-h);
    background: var(--panel); border-bottom: 1px solid var(--border-strong);
  }
  .hdr-cell {
    position: absolute; top: 0; height: var(--header-h);
    border-left: 1px solid var(--grid-strong); box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-size: 11px; color: var(--muted); overflow: hidden;
  }
  .hdr-cell .big { font-weight: 600; color: var(--text); font-size: 12px; }
  #chart-body { position: relative; }
  .grid-col {
    position: absolute; top: 0; bottom: 0; border-left: 1px solid var(--grid);
  }
  .grid-col.weekend { background: var(--weekend); }
  .grid-col.month-start { border-left: 1px solid var(--grid-strong); }
  .row-line {
    position: absolute; left: 0; right: 0; height: var(--row-h);
    border-bottom: 1px solid var(--grid);
  }
  .row-line.group { background: #fbfcfe; }
  #today-line {
    position: absolute; top: 0; bottom: 0; width: 2px; background: var(--today-line);
    z-index: 6; pointer-events: none;
  }

  /* bars */
  .bar {
    position: absolute; height: 22px; border-radius: 6px; cursor: grab;
    box-shadow: var(--shadow); overflow: hidden; user-select: none;
    display: flex; align-items: center; z-index: 8;
  }
  .bar:active { cursor: grabbing; }
  .bar .fill { position: absolute; left: 0; top: 0; bottom: 0; background: rgba(255,255,255,.35); }
  .bar .label {
    position: relative; padding: 0 8px; font-size: 11.5px; color: #fff; white-space: nowrap;
    text-shadow: 0 1px 1px rgba(0,0,0,.25); pointer-events: none; overflow: hidden; text-overflow: ellipsis;
  }
  .bar .handle {
    position: absolute; top: 0; bottom: 0; width: 7px; cursor: ew-resize; z-index: 2;
  }
  .bar .handle.l { left: 0; }
  .bar .handle.r { right: 0; }
  .bar.selected { outline: 2px solid #1f2733; outline-offset: 1px; }

  .milestone {
    position: absolute; width: 18px; height: 18px; transform: rotate(45deg);
    border-radius: 3px; cursor: grab; z-index: 9; box-shadow: var(--shadow);
    border: 2px solid rgba(255,255,255,.8);
  }
  .milestone.selected { outline: 2px solid #1f2733; outline-offset: 2px; }
  .ms-label {
    position: absolute; font-size: 11px; color: var(--text); white-space: nowrap;
    pointer-events: none; z-index: 9;
  }

  /* dependency arrows */
  #dep-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 7; overflow: visible; }
  #dep-svg > path { stroke: #94a3b8; stroke-width: 1.6; fill: none; stroke-linejoin: round; stroke-linecap: round; }
  #dep-svg marker path { fill: #94a3b8; stroke: none; }

  /* ---------- Modal / editor ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(16,24,40,.35); z-index: 100;
    display: none; align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; width: 420px; max-width: calc(100vw - 32px);
    max-height: calc(100vh - 48px); overflow: auto; box-shadow: 0 20px 60px rgba(16,24,40,.3);
  }
  .modal h3 { margin: 0; padding: 16px 18px; border-bottom: 1px solid var(--border); font-size: 15px; }
  .modal .body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 600; }
  .modal input[type=text], .modal input[type=date], .modal input[type=number], .modal select {
    width: 100%; padding: 8px 9px; border: 1px solid var(--border-strong); border-radius: 7px;
    font-size: 13px; font-family: inherit; background: #fff; color: var(--text);
  }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }
  .check { display: flex; align-items: center; gap: 8px; }
  .check input { width: 16px; height: 16px; }
  .dep-list { display: flex; flex-direction: column; gap: 6px; max-height: 140px; overflow: auto;
    border: 1px solid var(--border); border-radius: 7px; padding: 8px; }
  .dep-list .d { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .modal .foot { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .modal .foot .left { margin-right: auto; }
  .danger { color: #e11d48; border-color: #f3b5c2; }
  .danger:hover { background: #fff1f4; }
  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-row input[type=range] { flex: 1; }
  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: #1f2733; color: #fff; padding: 9px 16px; border-radius: 8px; font-size: 13px;
    z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">📊 Gantt</span>
    <button class="btn" id="add-task">+ Task</button>
    <button class="btn" id="add-milestone">+ Milestone</button>
    <button class="btn" id="add-group">+ Group</button>
    <div class="seg" id="view-seg">
      <button data-view="day">Day</button>
      <button data-view="week">Week</button>
      <button data-view="month">Month</button>
    </div>
    <button class="btn" id="today-btn">Today</button>
    <span class="spacer"></span>
    <button class="btn" id="cloud-btn">☁ Cloud <span class="cloud-dot"></span></button>
    <button class="btn" id="export-btn">Export</button>
    <button class="btn" id="import-btn">Import</button>
    <button class="btn primary" id="save-btn">Save <span class="dirty-dot"></span></button>
  </div>
  <div id="save-mode-banner"></div>

  <div id="main">
    <div id="list-pane">
      <div id="list-head">Tasks</div>
      <div id="list-body"><div id="list-inner"></div></div>
    </div>
    <div id="chart-pane">
      <div id="chart-inner">
        <div id="chart-header"></div>
        <div id="chart-body">
          <svg id="dep-svg"></svg>
          <div id="today-line"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Task / milestone editor -->
<div class="overlay" id="editor-overlay">
  <div class="modal">
    <h3 id="editor-title">Edit Task</h3>
    <div class="body">
      <div>
        <label>Name</label>
        <input type="text" id="f-name" autocomplete="off">
      </div>
      <div class="row2">
        <div>
          <label>Group</label>
          <select id="f-group"></select>
        </div>
        <div class="check" style="align-self:flex-end; padding-bottom:8px;">
          <input type="checkbox" id="f-milestone"><label style="margin:0;">Milestone</label>
        </div>
      </div>
      <div>
        <div class="check" style="margin-bottom:8px;">
          <input type="checkbox" id="f-use-color"><label style="margin:0;">Custom color (otherwise uses the group color)</label>
        </div>
        <div id="f-swatches" class="swatches"></div>
        <div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
          <input type="color" id="f-color" style="width:46px; height:32px; padding:2px; border:1px solid var(--border-strong); border-radius:7px;">
          <span style="color:var(--muted); font-size:12px;">or pick a custom shade</span>
        </div>
      </div>
      <div class="row2">
        <div>
          <label>Start</label>
          <input type="date" id="f-start">
        </div>
        <div id="end-wrap">
          <label>End</label>
          <input type="date" id="f-end">
        </div>
      </div>
      <div id="progress-wrap">
        <label>Progress: <span id="prog-val">0</span>%</label>
        <div class="range-row">
          <input type="range" id="f-progress" min="0" max="100" step="5">
        </div>
      </div>
      <div>
        <label>Depends on (must finish first)</label>
        <div class="dep-list" id="f-deps"></div>
      </div>
    </div>
    <div class="foot">
      <button class="btn danger" id="f-delete">Delete</button>
      <button class="btn left" id="f-duplicate">Duplicate</button>
      <button class="btn" id="f-cancel">Cancel</button>
      <button class="btn primary" id="f-save">Save</button>
    </div>
  </div>
</div>

<!-- Group editor -->
<div class="overlay" id="group-overlay">
  <div class="modal">
    <h3 id="group-title">Add Group</h3>
    <div class="body">
      <div>
        <label>Name</label>
        <input type="text" id="g-name" autocomplete="off">
      </div>
      <div>
        <label>Color</label>
        <input type="color" id="g-color" value="#3b82f6" style="width:60px; height:34px; padding:2px; border:1px solid var(--border-strong); border-radius:7px;">
      </div>
    </div>
    <div class="foot">
      <button class="btn danger left" id="g-delete">Delete</button>
      <button class="btn" id="g-cancel">Cancel</button>
      <button class="btn primary" id="g-save">Save</button>
    </div>
  </div>
</div>

<!-- Dropbox cloud sync -->
<div class="overlay" id="cloud-overlay">
  <div class="modal">
    <h3>☁ Dropbox Sync</h3>
    <div class="body">
      <div id="c-status" class="c-status">Not connected.</div>
      <div>
        <label>Dropbox app key</label>
        <input type="text" id="c-appkey" autocomplete="off" placeholder="e.g. a1b2c3d4e5f6g7h">
        <div style="color:var(--muted); font-size:11.5px; margin-top:4px;">
          From your Dropbox app at dropbox.com/developers/apps (see README to create one).
        </div>
      </div>
      <div id="c-connect-row">
        <button class="btn primary" id="c-connect">Connect Dropbox…</button>
      </div>
      <div id="c-code-row" style="display:none;">
        <label>Paste the authorization code from Dropbox</label>
        <div style="display:flex; gap:8px;">
          <input type="text" id="c-code" autocomplete="off" placeholder="authorization code">
          <button class="btn primary" id="c-finish" style="flex:0 0 auto;">Finish</button>
        </div>
      </div>
      <div>
        <label>File path (the JSON file in your Dropbox)</label>
        <input type="text" id="c-path" autocomplete="off" placeholder="/gantt/board.json">
        <div style="color:var(--muted); font-size:11.5px; margin-top:4px;">
          Change this and click <b>Load</b> to switch to a different board/file.
        </div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn" id="c-load">Load from Dropbox</button>
        <button class="btn" id="c-save">Save now</button>
        <button class="btn danger" id="c-disconnect" style="margin-left:auto;">Disconnect</button>
      </div>
    </div>
    <div class="foot">
      <button class="btn primary" id="c-close">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function () {
  // ---------------------------------------------------------------------------
  // Constants & geometry
  // ---------------------------------------------------------------------------
  const ROW_H = 38;
  const BAR_H = 22;
  const BAR_PAD = (ROW_H - BAR_H) / 2;
  const VIEW = {
    day:   { dayWidth: 46 },
    week:  { dayWidth: 22 },
    month: { dayWidth: 7  }
  };
  const DAY_MS = 86400000;
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  let state = loadState();
  let fileHandle = null;          // FileSystemFileHandle (Chrome/Edge)
  let dirty = false;
  let selectedId = null;
  let editingId = null;           // task id open in editor (null = new)
  let editingGroupId = null;
  let rangeStart = null, rangeEnd = null;  // Date objects defining the visible timeline (grows on scroll)
  let lastColor = null;                    // remembers the last custom color picked, to reuse on new tasks

  const supportsFS = typeof window.showSaveFilePicker === "function";

  // ---------------------------------------------------------------------------
  // DOM refs
  // ---------------------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const listInner = $("list-inner");
  const listBody  = $("list-body");
  const chartPane = $("chart-pane");
  const chartHeader = $("chart-header");
  const chartBody = $("chart-body");
  const depSvg = $("dep-svg");
  const todayLine = $("today-line");

  // ---------------------------------------------------------------------------
  // Date helpers (work in local time, date-only)
  // ---------------------------------------------------------------------------
  function parseD(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
  function fmtD(dt) {
    const y = dt.getFullYear(), m = String(dt.getMonth()+1).padStart(2,"0"), d = String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  function addDays(dt, n) { const r = new Date(dt); r.setDate(r.getDate()+n); return r; }
  function diffDays(a, b) { return Math.round((stripTime(b) - stripTime(a)) / DAY_MS); }
  function stripTime(dt) { return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
  function today() { return stripTime(new Date()); }

  // ---------------------------------------------------------------------------
  // Geometry: date <-> x
  // ---------------------------------------------------------------------------
  function dayWidth() { return VIEW[state.settings.viewMode].dayWidth; }
  function dateToX(dt) { return diffDays(rangeStart, dt) * dayWidth(); }
  function xToDate(x) { return addDays(rangeStart, Math.round(x / dayWidth())); }
  function totalDays() { return diffDays(rangeStart, rangeEnd) + 1; }
  function chartWidth() { return totalDays() * dayWidth(); }

  const INITIAL_PAD = 180; // days of timeline padding on each side at first layout
  function ensureRange() {
    let min = null, max = null;
    for (const t of state.tasks) {
      const s = parseD(t.start), e = parseD(t.isMilestone ? t.start : t.end);
      if (!min || s < min) min = s;
      if (!max || e > max) max = e;
    }
    const t = today();
    if (!min) { min = t; max = t; }
    if (t < min) min = t;
    if (t > max) max = t;
    let desiredStart = addDays(min, -INITIAL_PAD);
    let desiredEnd = addDays(max, INITIAL_PAD);
    // align start to a Sunday for clean week columns (Israeli week starts Sunday)
    desiredStart = addDays(desiredStart, -desiredStart.getDay());
    // Grow only — never shrink an already-extended window. This keeps the
    // timeline endless: scroll-driven extensions are preserved across renders.
    if (!rangeStart || desiredStart < rangeStart) rangeStart = desiredStart;
    if (!rangeEnd || desiredEnd > rangeEnd) rangeEnd = desiredEnd;
  }

  // ---------------------------------------------------------------------------
  // Ordered rows: groups followed by their tasks (matches list & chart)
  // ---------------------------------------------------------------------------
  function orderedRows() {
    const rows = [];
    const used = new Set();
    for (const g of state.groups) {
      rows.push({ type: "group", group: g });
      for (const t of state.tasks) {
        if (t.groupId === g.id) { rows.push({ type: "task", task: t, group: g }); used.add(t.id); }
      }
    }
    const orphans = state.tasks.filter(t => !used.has(t.id));
    if (orphans.length) {
      rows.push({ type: "group", group: { id: "__none", name: "Ungrouped", color: "#94a3b8" } });
      for (const t of orphans) rows.push({ type: "task", task: t, group: { color: "#94a3b8" } });
    }
    return rows;
  }
  function rowIndexOfTask(id, rows) { return rows.findIndex(r => r.type === "task" && r.task.id === id); }

  // ---------------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------------
  function render() {
    ensureRange();
    const rows = orderedRows();
    const w = chartWidth();
    const h = rows.length * ROW_H;

    renderList(rows);
    renderHeader(w);
    renderGrid(rows, w, h);
    renderBars(rows, w, h);
    renderDeps(rows);
    positionTodayLine(h);

    chartBody.style.width = w + "px";
    chartBody.style.height = h + "px";
    chartHeader.style.width = w + "px";
    $("chart-inner").style.width = w + "px";
  }

  // ---------------------------------------------------------------------------
  // List drag-to-reorder
  // ---------------------------------------------------------------------------
  let dragTaskId = null;
  function clearDropMarks() {
    listInner.querySelectorAll(".drop-before, .drop-after, .drop-into")
      .forEach(e => e.classList.remove("drop-before", "drop-after", "drop-into"));
  }
  function reorderTaskRelativeTo(targetTask, after) {
    if (!dragTaskId || dragTaskId === targetTask.id) return;
    const dragged = state.tasks.find(x => x.id === dragTaskId);
    if (!dragged) return;
    state.tasks = state.tasks.filter(x => x.id !== dragTaskId);
    dragged.groupId = targetTask.groupId; // adopt the target's group (supports cross-group moves)
    let idx = state.tasks.findIndex(x => x.id === targetTask.id);
    if (idx < 0) idx = state.tasks.length;
    if (after) idx += 1;
    state.tasks.splice(idx, 0, dragged);
    markDirty(); render();
  }
  function moveTaskToGroupTop(groupId) {
    if (!dragTaskId) return;
    const dragged = state.tasks.find(x => x.id === dragTaskId);
    if (!dragged) return;
    state.tasks = state.tasks.filter(x => x.id !== dragTaskId);
    dragged.groupId = (groupId === "__none") ? null : groupId;
    const idx = state.tasks.findIndex(x => x.groupId === dragged.groupId);
    if (idx < 0) state.tasks.push(dragged); else state.tasks.splice(idx, 0, dragged);
    markDirty(); render();
  }

  function renderList(rows) {
    listInner.innerHTML = "";
    for (const r of rows) {
      const el = document.createElement("div");
      if (r.type === "group") {
        el.className = "list-row group-head";
        el.innerHTML = `<span class="swatch" style="background:${r.group.color}"></span>
                        <span class="nm">${esc(r.group.name)}</span>`;
        if (r.group.id !== "__none") {
          el.style.cursor = "pointer";
          el.title = "Edit group";
          el.addEventListener("click", () => openGroupEditor(r.group.id));
          const add = document.createElement("button");
          add.className = "grp-add";
          add.textContent = "+";
          add.title = "Add task to this group";
          add.addEventListener("click", (e) => { e.stopPropagation(); openEditor(null, r.group.id); });
          el.appendChild(add);
        }
        // drop a task onto a group header to move it into that group
        el.addEventListener("dragover", (e) => { if (!dragTaskId) return; e.preventDefault(); el.classList.add("drop-into"); });
        el.addEventListener("dragleave", () => el.classList.remove("drop-into"));
        el.addEventListener("drop", (e) => { e.preventDefault(); el.classList.remove("drop-into"); moveTaskToGroupTop(r.group.id); });
      } else {
        const t = r.task;
        el.className = "list-row task-row" + (t.id === selectedId ? " sel" : "");
        const range = t.isMilestone ? fmtShort(parseD(t.start))
                                    : `${fmtShort(parseD(t.start))}–${fmtShort(parseD(t.end))}`;
        const mark = t.isMilestone ? "◆ " : "";
        el.innerHTML = `<span class="swatch" style="background:${t.color || r.group.color}"></span>
                        <span class="nm">${mark}${esc(t.name)}</span>
                        <span class="meta">${t.isMilestone ? "" : t.progress + "% · "}${range}</span>`;
        el.addEventListener("click", () => openEditor(t.id));
        // drag to reorder
        el.draggable = true;
        el.addEventListener("dragstart", (e) => {
          dragTaskId = t.id;
          if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = "move";
            try { e.dataTransfer.setData("text/plain", t.id); } catch (_) {}
          }
          el.classList.add("dragging");
        });
        el.addEventListener("dragend", () => { el.classList.remove("dragging"); clearDropMarks(); dragTaskId = null; });
        el.addEventListener("dragover", (e) => {
          if (!dragTaskId || dragTaskId === t.id) return;
          e.preventDefault();
          const rect = el.getBoundingClientRect();
          const after = (e.clientY - rect.top) > rect.height / 2;
          clearDropMarks(); el.classList.add(after ? "drop-after" : "drop-before");
        });
        el.addEventListener("dragleave", () => el.classList.remove("drop-before", "drop-after"));
        el.addEventListener("drop", (e) => {
          e.preventDefault();
          const rect = el.getBoundingClientRect();
          const after = (e.clientY - rect.top) > rect.height / 2;
          clearDropMarks(); reorderTaskRelativeTo(t, after);
        });
      }
      listInner.appendChild(el);
    }
  }

  function renderHeader(w) {
    chartHeader.innerHTML = "";
    const vm = state.settings.viewMode;
    const dw = dayWidth();
    const n = totalDays();

    if (vm === "day") {
      for (let i = 0; i < n; i++) {
        const d = addDays(rangeStart, i);
        const cell = hdrCell(i*dw, dw);
        cell.innerHTML = `<span>${DOW[d.getDay()]}</span><span class="big">${d.getDate()}</span>`;
        if (d.getDate() === 1) cell.innerHTML = `<span>${MONTHS[d.getMonth()]}</span><span class="big">${d.getDate()}</span>`;
        chartHeader.appendChild(cell);
      }
    } else if (vm === "week") {
      // week cells (7 days), label = month + start date
      for (let i = 0; i < n; i += 7) {
        const d = addDays(rangeStart, i);
        const cell = hdrCell(i*dw, dw*7);
        cell.innerHTML = `<span>${MONTHS[d.getMonth()]}</span><span class="big">${d.getDate()}</span>`;
        chartHeader.appendChild(cell);
      }
    } else { // month
      let i = 0;
      while (i < n) {
        const d = addDays(rangeStart, i);
        const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
        const monthEnd = new Date(d.getFullYear(), d.getMonth()+1, 0);
        const fromIdx = Math.max(0, diffDays(rangeStart, monthStart));
        const span = Math.min(n, diffDays(rangeStart, monthEnd)+1) - fromIdx;
        const cell = hdrCell(fromIdx*dw, span*dw);
        cell.innerHTML = `<span class="big">${MONTHS[d.getMonth()]} ${d.getFullYear()}</span>`;
        chartHeader.appendChild(cell);
        i = fromIdx + span;
      }
    }
  }
  function hdrCell(left, width) {
    const c = document.createElement("div");
    c.className = "hdr-cell";
    c.style.left = left + "px";
    c.style.width = width + "px";
    return c;
  }

  function renderGrid(rows, w, h) {
    // remove old grid cols & row lines
    chartBody.querySelectorAll(".grid-col, .row-line").forEach(e => e.remove());
    const vm = state.settings.viewMode;
    const dw = dayWidth();
    const n = totalDays();

    // vertical columns
    if (vm === "day" || vm === "week") {
      for (let i = 0; i < n; i++) {
        const d = addDays(rangeStart, i);
        const col = document.createElement("div");
        col.className = "grid-col";
        if (d.getDay() === 5 || d.getDay() === 6) col.classList.add("weekend"); // Fri–Sat (Israel)
        if (d.getDate() === 1) col.classList.add("month-start");
        col.style.left = (i*dw) + "px";
        col.style.width = dw + "px";
        chartBody.appendChild(col);
      }
    } else {
      let i = 0;
      while (i < n) {
        const d = addDays(rangeStart, i);
        const monthEnd = new Date(d.getFullYear(), d.getMonth()+1, 0);
        const span = Math.min(n, diffDays(rangeStart, monthEnd)+1) - i;
        const col = document.createElement("div");
        col.className = "grid-col month-start";
        col.style.left = (i*dw) + "px";
        col.style.width = (span*dw) + "px";
        chartBody.appendChild(col);
        i += span;
      }
    }

    // horizontal row lines
    rows.forEach((r, idx) => {
      const line = document.createElement("div");
      line.className = "row-line" + (r.type === "group" ? " group" : "");
      line.style.top = (idx*ROW_H) + "px";
      chartBody.appendChild(line);
    });
  }

  function renderBars(rows, w, h) {
    // remove old bars / milestones / labels
    chartBody.querySelectorAll(".bar, .milestone, .ms-label").forEach(e => e.remove());
    const dw = dayWidth();
    rows.forEach((r, idx) => {
      if (r.type !== "task") return;
      const t = r.task;
      const top = idx*ROW_H;
      if (t.isMilestone) {
        const x = dateToX(parseD(t.start));
        const m = document.createElement("div");
        m.className = "milestone" + (t.id === selectedId ? " selected" : "");
        m.style.left = (x - 9) + "px";
        m.style.top = (top + (ROW_H-18)/2) + "px";
        m.style.background = t.color || r.group.color;
        m.dataset.id = t.id;
        chartBody.appendChild(m);
        const lbl = document.createElement("div");
        lbl.className = "ms-label";
        lbl.textContent = t.name;
        lbl.style.left = (x + 14) + "px";
        lbl.style.top = (top + (ROW_H-14)/2) + "px";
        chartBody.appendChild(lbl);
        attachMilestoneDrag(m, t);
      } else {
        const x = dateToX(parseD(t.start));
        const days = Math.max(1, diffDays(parseD(t.start), parseD(t.end)) + 1);
        const bw = days * dw;
        const bar = document.createElement("div");
        bar.className = "bar" + (t.id === selectedId ? " selected" : "");
        bar.style.left = x + "px";
        bar.style.top = (top + BAR_PAD) + "px";
        bar.style.width = bw + "px";
        bar.style.background = t.color || r.group.color;
        bar.dataset.id = t.id;
        bar.innerHTML = `<div class="fill" style="width:${t.progress}%"></div>
                         <div class="handle l"></div>
                         <span class="label">${esc(t.name)}</span>
                         <div class="handle r"></div>`;
        chartBody.appendChild(bar);
        attachBarDrag(bar, t);
      }
    });
  }

  function renderDeps(rows) {
    while (depSvg.firstChild) depSvg.removeChild(depSvg.firstChild);
    const NS = "http://www.w3.org/2000/svg";
    const GAP = 5;   // distance the arrowhead stops before the target
    const STUB = 14; // short horizontal segment leaving the predecessor
    for (const t of state.tasks) {
      if (!t.deps || !t.deps.length) continue;
      const toIdx = rowIndexOfTask(t.id, rows);
      if (toIdx < 0) continue;
      const toX = dateToX(parseD(t.start));
      const toY = toIdx*ROW_H + ROW_H/2;
      // entry point on the successor (left vertex for milestones); arrow points right
      const targetX = (t.isMilestone ? toX - 9 : toX) - GAP;
      for (const depId of t.deps) {
        const from = state.tasks.find(x => x.id === depId);
        if (!from) continue;
        const fromIdx = rowIndexOfTask(depId, rows);
        if (fromIdx < 0) continue;
        // exit point on the predecessor (right edge / right vertex for milestones)
        const x1 = from.isMilestone ? dateToX(parseD(from.start)) + 9
                                    : dateToX(addDays(parseD(from.end), 1));
        const y1 = fromIdx*ROW_H + ROW_H/2;
        // Smooth S-curve with horizontal tangents at both ends. The end tangent
        // points right, so the arrowhead always enters the successor cleanly —
        // works for forward, adjacent, overlapping, and backward links alike.
        const k = Math.max(STUB, Math.abs(targetX - x1) * 0.4 + 10);
        const d = `M ${x1} ${y1} C ${x1 + k} ${y1}, ${targetX - k} ${toY}, ${targetX} ${toY}`;
        const path = document.createElementNS(NS, "path");
        path.setAttribute("d", d);
        path.setAttribute("marker-end", "url(#arrow)");
        depSvg.appendChild(path);
      }
    }
    // arrow marker
    const defs = document.createElementNS(NS, "defs");
    defs.innerHTML = `<marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L7,3.5 L0,7 Z" fill="#94a3b8" stroke="none"></path></marker>`;
    depSvg.appendChild(defs);
    depSvg.setAttribute("width", chartWidth());
    depSvg.setAttribute("height", rows.length*ROW_H);
  }

  function positionTodayLine(h) {
    const x = dateToX(today()) + dayWidth()/2;
    todayLine.style.left = x + "px";
    todayLine.style.height = h + "px";
  }

  // ---------------------------------------------------------------------------
  // Drag: move & resize bars
  // ---------------------------------------------------------------------------
  function attachBarDrag(bar, t) {
    const lh = bar.querySelector(".handle.l");
    const rh = bar.querySelector(".handle.r");
    lh.addEventListener("pointerdown", (e) => startResize(e, t, "l"));
    rh.addEventListener("pointerdown", (e) => startResize(e, t, "r"));
    bar.addEventListener("pointerdown", (e) => {
      if (e.target.classList.contains("handle")) return;
      startMove(e, t, bar);
    });
    bar.addEventListener("dblclick", () => openEditor(t.id));
  }

  function attachMilestoneDrag(m, t) {
    m.addEventListener("pointerdown", (e) => startMoveMilestone(e, t, m));
    m.addEventListener("dblclick", () => openEditor(t.id));
  }

  function startMove(e, t, bar) {
    e.preventDefault();
    select(t.id);
    const dw = dayWidth();
    const startX = e.clientX;
    const origStart = parseD(t.start), origEnd = parseD(t.end);
    let moved = false;
    bar.setPointerCapture(e.pointerId);
    function move(ev) {
      const delta = Math.round((ev.clientX - startX) / dw);
      if (delta !== 0) moved = true;
      bar.style.left = (dateToX(addDays(origStart, delta))) + "px";
    }
    function up(ev) {
      bar.releasePointerCapture(e.pointerId);
      bar.removeEventListener("pointermove", move);
      bar.removeEventListener("pointerup", up);
      const delta = Math.round((ev.clientX - startX) / dw);
      if (delta !== 0) {
        t.start = fmtD(addDays(origStart, delta));
        t.end = fmtD(addDays(origEnd, delta));
        markDirty(); render();
      }
    }
    bar.addEventListener("pointermove", move);
    bar.addEventListener("pointerup", up);
  }

  function startMoveMilestone(e, t, m) {
    e.preventDefault();
    select(t.id);
    const dw = dayWidth();
    const startX = e.clientX;
    const orig = parseD(t.start);
    m.setPointerCapture(e.pointerId);
    function move(ev) {
      const delta = Math.round((ev.clientX - startX) / dw);
      m.style.left = (dateToX(addDays(orig, delta)) - 9) + "px";
    }
    function up(ev) {
      m.releasePointerCapture(e.pointerId);
      m.removeEventListener("pointermove", move);
      m.removeEventListener("pointerup", up);
      const delta = Math.round((ev.clientX - startX) / dw);
      if (delta !== 0) { t.start = fmtD(addDays(orig, delta)); t.end = t.start; markDirty(); render(); }
    }
    m.addEventListener("pointermove", move);
    m.addEventListener("pointerup", up);
  }

  function startResize(e, t, side) {
    e.preventDefault(); e.stopPropagation();
    select(t.id);
    const dw = dayWidth();
    const startX = e.clientX;
    const origStart = parseD(t.start), origEnd = parseD(t.end);
    const target = e.target;
    target.setPointerCapture(e.pointerId);
    function move(ev) {
      const delta = Math.round((ev.clientX - startX) / dw);
      const bar = target.parentElement;
      if (side === "l") {
        const ns = addDays(origStart, Math.min(delta, diffDays(origStart, origEnd)));
        bar.style.left = dateToX(ns) + "px";
        bar.style.width = ((diffDays(ns, origEnd)+1)*dw) + "px";
      } else {
        const ne = addDays(origEnd, Math.max(delta, -diffDays(origStart, origEnd)));
        bar.style.width = ((diffDays(origStart, ne)+1)*dw) + "px";
      }
    }
    function up(ev) {
      target.releasePointerCapture(e.pointerId);
      target.removeEventListener("pointermove", move);
      target.removeEventListener("pointerup", up);
      const delta = Math.round((ev.clientX - startX) / dw);
      if (side === "l") {
        const ns = addDays(origStart, Math.min(delta, diffDays(origStart, origEnd)));
        t.start = fmtD(ns);
      } else {
        const ne = addDays(origEnd, Math.max(delta, -diffDays(origStart, origEnd)));
        t.end = fmtD(ne);
      }
      markDirty(); render();
    }
    target.addEventListener("pointermove", move);
    target.addEventListener("pointerup", up);
  }

  function select(id) {
    selectedId = id;
    chartBody.querySelectorAll(".bar, .milestone").forEach(el => {
      el.classList.toggle("selected", el.dataset.id === id);
    });
  }

  // ---------------------------------------------------------------------------
  // Scroll sync (list <-> chart vertical)
  // ---------------------------------------------------------------------------
  let extending = false;
  const EDGE_PX = 400; // start extending when this close to an edge
  chartPane.addEventListener("scroll", () => {
    listInner.style.transform = `translateY(${-chartPane.scrollTop}px)`;
    if (extending) return;
    const dw = dayWidth();
    let addN = Math.ceil((chartPane.clientWidth * 1.5) / dw);
    addN = Math.ceil(addN / 7) * 7; // keep week columns aligned
    if (chartPane.scrollLeft < EDGE_PX) {
      // extend into the past; re-anchor scroll so the view doesn't jump
      extending = true;
      rangeStart = addDays(rangeStart, -addN);
      render();
      chartPane.scrollLeft += addN * dw;
      extending = false;
    } else if (chartPane.scrollLeft + chartPane.clientWidth > chartWidth() - EDGE_PX) {
      // extend into the future
      extending = true;
      rangeEnd = addDays(rangeEnd, addN);
      render();
      extending = false;
    }
  });

  // ---------------------------------------------------------------------------
  // Editor (task / milestone)
  // ---------------------------------------------------------------------------
  const edOverlay = $("editor-overlay");

  function openEditor(id, presetGroupId) {
    editingId = id;
    const t = id ? state.tasks.find(x => x.id === id) : null;
    $("editor-title").textContent = id ? "Edit Task" : "New Task";

    // populate group select
    const gSel = $("f-group");
    gSel.innerHTML = state.groups.map(g => `<option value="${g.id}">${esc(g.name)}</option>`).join("")
                     || `<option value="">(no groups)</option>`;

    if (t) {
      $("f-name").value = t.name;
      $("f-group").value = t.groupId || (state.groups[0] && state.groups[0].id) || "";
      $("f-milestone").checked = !!t.isMilestone;
      $("f-start").value = t.start;
      $("f-end").value = t.end;
      $("f-progress").value = t.progress || 0;
      $("prog-val").textContent = t.progress || 0;
      $("f-use-color").checked = !!t.color;
      $("f-color").value = t.color || groupColorOf($("f-group").value);
      $("f-delete").style.display = "";
      $("f-duplicate").style.display = "";
    } else {
      const start = today();
      $("f-name").value = "";
      $("f-group").value = presetGroupId || (state.groups[0] && state.groups[0].id) || "";
      $("f-milestone").checked = false;
      $("f-start").value = fmtD(start);
      $("f-end").value = fmtD(addDays(start, 3));
      $("f-progress").value = 0;
      $("prog-val").textContent = 0;
      $("f-use-color").checked = !!lastColor;
      $("f-color").value = lastColor || groupColorOf($("f-group").value);
      $("f-delete").style.display = "none";
      $("f-duplicate").style.display = "none";
    }
    buildDepList(id);
    toggleMilestoneUI();
    syncColorUI();
    edOverlay.classList.add("show");
    setTimeout(() => $("f-name").focus(), 30);
  }

  function buildDepList(id) {
    const t = id ? state.tasks.find(x => x.id === id) : null;
    const deps = (t && t.deps) || [];
    const candidates = state.tasks.filter(x => x.id !== id);
    const box = $("f-deps");
    if (!candidates.length) { box.innerHTML = `<span style="color:var(--muted)">No other tasks yet.</span>`; return; }
    box.innerHTML = candidates.map(c =>
      `<label class="d"><input type="checkbox" value="${c.id}" ${deps.includes(c.id) ? "checked" : ""}>
       ${c.isMilestone ? "◆ " : ""}${esc(c.name)}</label>`).join("");
  }

  function toggleMilestoneUI() {
    const ms = $("f-milestone").checked;
    $("end-wrap").style.display = ms ? "none" : "";
    $("progress-wrap").style.display = ms ? "none" : "";
  }
  function groupColorOf(gid) { const g = state.groups.find(x => x.id === gid); return g ? g.color : "#94a3b8"; }
  function renderSwatches() {
    const box = $("f-swatches");
    box.innerHTML = "";
    COLORS.forEach(c => {
      const b = document.createElement("button");
      b.type = "button"; b.className = "sw"; b.style.background = c; b.dataset.color = c; b.title = c;
      b.addEventListener("click", () => {
        $("f-color").value = c; $("f-use-color").checked = true; syncColorUI();
      });
      box.appendChild(b);
    });
  }
  function syncColorUI() {
    const custom = $("f-use-color").checked;
    $("f-color").disabled = !custom;
    $("f-color").style.opacity = custom ? "1" : ".5";
    const cur = ($("f-color").value || "").toLowerCase();
    $("f-swatches").querySelectorAll(".sw").forEach(b =>
      b.classList.toggle("sel", custom && b.dataset.color.toLowerCase() === cur));
  }
  $("f-milestone").addEventListener("change", toggleMilestoneUI);
  $("f-progress").addEventListener("input", () => $("prog-val").textContent = $("f-progress").value);
  $("f-use-color").addEventListener("change", () => {
    if (!$("f-use-color").checked) $("f-color").value = groupColorOf($("f-group").value);
    syncColorUI();
  });
  $("f-color").addEventListener("input", () => { $("f-use-color").checked = true; syncColorUI(); });
  $("f-group").addEventListener("change", () => {
    if (!$("f-use-color").checked) { $("f-color").value = groupColorOf($("f-group").value); syncColorUI(); }
  });

  function closeEditor() { edOverlay.classList.remove("show"); editingId = null; }

  $("f-cancel").addEventListener("click", closeEditor);
  edOverlay.addEventListener("click", (e) => { if (e.target === edOverlay) closeEditor(); });

  $("f-save").addEventListener("click", () => {
    const name = $("f-name").value.trim() || "Untitled";
    const isMs = $("f-milestone").checked;
    let start = $("f-start").value || fmtD(today());
    let end = isMs ? start : ($("f-end").value || start);
    if (!isMs && parseD(end) < parseD(start)) end = start;
    const groupId = $("f-group").value || null;
    const progress = isMs ? 0 : Number($("f-progress").value);
    const deps = Array.from($("f-deps").querySelectorAll("input:checked")).map(i => i.value);
    const color = $("f-use-color").checked ? $("f-color").value : null;
    if (color) lastColor = color; // reuse this color as the default for the next new task

    if (editingId) {
      const t = state.tasks.find(x => x.id === editingId);
      Object.assign(t, { name, groupId, start, end, progress, isMilestone: isMs, deps, color });
    } else {
      state.tasks.push({ id: uid("t"), name, groupId, start, end, progress, isMilestone: isMs, deps, color });
    }
    markDirty(); closeEditor(); render();
  });

  $("f-delete").addEventListener("click", () => {
    if (!editingId) return;
    const snap = snapshot();
    const id = editingId;
    state.tasks = state.tasks.filter(x => x.id !== id);
    // clean up dependencies referencing it
    state.tasks.forEach(t => { if (t.deps) t.deps = t.deps.filter(d => d !== id); });
    if (selectedId === id) selectedId = null;
    markDirty(); closeEditor(); render();
    toast("Task deleted", "Undo", () => restoreState(snap));
  });

  $("f-duplicate").addEventListener("click", () => {
    if (!editingId) return;
    const orig = state.tasks.find(x => x.id === editingId);
    if (!orig) return;
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = uid("t");
    copy.name = orig.name + " (copy)";
    copy.deps = Array.isArray(orig.deps) ? orig.deps.slice() : [];
    const idx = state.tasks.findIndex(x => x.id === editingId);
    state.tasks.splice(idx + 1, 0, copy); // place right after the original
    selectedId = copy.id;
    markDirty(); closeEditor(); render();
    toast("Task duplicated");
  });

  // ---------------------------------------------------------------------------
  // Group editor
  // ---------------------------------------------------------------------------
  const gOverlay = $("group-overlay");
  function openGroupEditor(id) {
    editingGroupId = id || null;
    const g = id ? state.groups.find(x => x.id === id) : null;
    $("group-title").textContent = id ? "Edit Group" : "Add Group";
    $("g-name").value = g ? g.name : "";
    $("g-color").value = g ? g.color : pickColor();
    $("g-delete").style.display = id ? "" : "none";
    gOverlay.classList.add("show");
    setTimeout(() => $("g-name").focus(), 30);
  }
  function closeGroupEditor() { gOverlay.classList.remove("show"); editingGroupId = null; }
  $("g-cancel").addEventListener("click", closeGroupEditor);
  gOverlay.addEventListener("click", (e) => { if (e.target === gOverlay) closeGroupEditor(); });
  $("g-save").addEventListener("click", () => {
    const name = $("g-name").value.trim() || "Group";
    const color = $("g-color").value;
    if (editingGroupId) {
      Object.assign(state.groups.find(x => x.id === editingGroupId), { name, color });
    } else {
      state.groups.push({ id: uid("g"), name, color });
    }
    markDirty(); closeGroupEditor(); render();
  });
  $("g-delete").addEventListener("click", () => {
    if (!editingGroupId) return;
    const snap = snapshot();
    const gid = editingGroupId;
    const childIds = state.tasks.filter(t => t.groupId === gid).map(t => t.id);
    const removed = new Set(childIds);
    state.tasks = state.tasks.filter(t => !removed.has(t.id));
    // clean up dependencies in remaining tasks that pointed at the deleted ones
    state.tasks.forEach(t => { if (t.deps) t.deps = t.deps.filter(d => !removed.has(d)); });
    if (removed.has(selectedId)) selectedId = null;
    state.groups = state.groups.filter(x => x.id !== gid);
    markDirty(); closeGroupEditor(); render();
    const n = childIds.length;
    toast(n ? `Group + ${n} task${n > 1 ? "s" : ""} deleted` : "Group deleted", "Undo", () => restoreState(snap));
  });

  // ---------------------------------------------------------------------------
  // Toolbar actions
  // ---------------------------------------------------------------------------
  $("add-task").addEventListener("click", () => openEditor(null));
  $("add-milestone").addEventListener("click", () => {
    openEditor(null);
    $("f-milestone").checked = true; toggleMilestoneUI();
    $("editor-title").textContent = "New Milestone";
  });
  $("add-group").addEventListener("click", () => openGroupEditor(null));
  $("today-btn").addEventListener("click", () => {
    const x = dateToX(today());
    chartPane.scrollTo({ left: Math.max(0, x - chartPane.clientWidth/2), behavior: "smooth" });
  });
  $("view-seg").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    if (b.dataset.view === state.settings.viewMode) return;
    // remember the date currently centered in the viewport, then restore it
    const centerDate = xToDate(chartPane.scrollLeft + chartPane.clientWidth / 2);
    state.settings.viewMode = b.dataset.view;
    markDirty(); updateViewButtons(); render();
    chartPane.scrollLeft = Math.max(0, dateToX(centerDate) + dayWidth() / 2 - chartPane.clientWidth / 2);
  });
  function updateViewButtons() {
    $("view-seg").querySelectorAll("button").forEach(b =>
      b.classList.toggle("active", b.dataset.view === state.settings.viewMode));
  }

  // ---------------------------------------------------------------------------
  // Persistence
  // ---------------------------------------------------------------------------
  function serialize() { return JSON.stringify(state); }

  function buildHtml() {
    // Clone the document and strip all runtime-generated DOM so the saved file
    // stays lean (it self-rebuilds on load). Then splice fresh JSON into the
    // data block via plain string replacement.
    const root = document.documentElement.cloneNode(true);
    const q = (sel) => root.querySelector(sel);
    const li = q("#list-inner");      if (li) li.innerHTML = "";
    const ch = q("#chart-header");    if (ch) ch.innerHTML = "";
    const cb = q("#chart-body");
    if (cb) cb.querySelectorAll(".grid-col, .row-line, .bar, .milestone, .ms-label").forEach(e => e.remove());
    const svg = q("#dep-svg");        if (svg) svg.innerHTML = "";
    // collapse open modals/toast so they don't persist as "shown"
    root.querySelectorAll(".overlay").forEach(o => o.classList.remove("show"));
    root.querySelectorAll(".toast").forEach(o => o.classList.remove("show"));
    if (root.querySelector("body")) root.querySelector("body").classList.remove("dirty");

    const html = "<!DOCTYPE html>\n<html lang=\"en\">" + root.innerHTML + "</html>\n";
    const open = '<script type="application/json" id="gantt-data">';
    const close = '<\/script>';
    const i = html.indexOf(open);
    if (i < 0) throw new Error("data block not found");
    const j = html.indexOf(close, i);
    if (j < 0) throw new Error("data block end not found");
    return html.slice(0, i + open.length) + "\n" + serialize() + "\n" + html.slice(j);
  }

  async function saveToFile() {
    let htmlOut;
    try { htmlOut = buildHtml(); }
    catch (err) { toast("Save failed: " + err.message); return; }

    if (supportsFS) {
      try {
        if (!fileHandle) {
          fileHandle = await window.showSaveFilePicker({
            suggestedName: "gantt.html",
            types: [{ description: "HTML", accept: { "text/html": [".html"] } }]
          });
        }
        const w = await fileHandle.createWritable();
        await w.write(htmlOut);
        await w.close();
        clearDirty();
        toast("Saved ✓");
      } catch (err) {
        if (err && err.name === "AbortError") return; // user cancelled
        toast("Save error: " + err.message);
      }
    } else {
      downloadHtml(htmlOut);
      clearDirty();
      toast("Downloaded gantt.html — move it to your Dropbox folder");
    }
  }

  function downloadHtml(htmlOut) {
    const blob = new Blob([htmlOut], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "gantt.html";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  // Unified save: cloud when connected (cloud-only mode), else fall back to file/download.
  async function save() {
    if (cloudConnected() && cloud.path) return saveToCloud();
    return saveToFile();
  }
  $("save-btn").addEventListener("click", save);

  // Export JSON
  $("export-btn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "gantt-data.json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  });

  // Import JSON
  $("import-btn").addEventListener("click", () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.addEventListener("change", () => {
      const f = inp.files[0]; if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data.tasks) throw new Error("missing tasks");
          state = normalize(data);
          markDirty(); updateViewButtons(); render();
          toast("Imported ✓");
        } catch (err) { toast("Import failed: " + err.message); }
      };
      reader.readAsText(f);
    });
    inp.click();
  });

  // keyboard: Cmd/Ctrl+S
  window.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "s") { e.preventDefault(); save(); }
    if (e.key === "Escape") { closeEditor(); closeGroupEditor(); closeCloud(); }
  });

  // warn before leaving with unsaved changes
  window.addEventListener("beforeunload", (e) => {
    if (dirty) { e.preventDefault(); e.returnValue = ""; }
  });

  function markDirty() { dirty = true; document.body.classList.add("dirty"); }
  function clearDirty() { dirty = false; document.body.classList.remove("dirty"); }

  // ---------------------------------------------------------------------------
  // Dropbox cloud sync (cloud-only mode; switch files via the path field)
  // ---------------------------------------------------------------------------
  const CLOUD_KEY = "gantt_cloud_v1";
  const DEFAULT_APP_KEY = "koxutq2xbswshbf"; // Dropbox PKCE app key (public client id; safe to embed)
  function loadCloud() {
    const def = { appKey: DEFAULT_APP_KEY, refreshToken: "", path: "", accessToken: "", accessExpiry: 0 };
    const merged = (() => {
      try { return Object.assign(def, JSON.parse(localStorage.getItem(CLOUD_KEY) || "{}")); }
      catch (_) { return def; }
    })();
    if (!merged.appKey) merged.appKey = DEFAULT_APP_KEY; // ensure the default fills in
    return merged;
  }
  function persistCloud() { try { localStorage.setItem(CLOUD_KEY, JSON.stringify(cloud)); } catch (_) {} }
  const cloud = loadCloud();
  let cloudRev = null;       // Dropbox revision of the currently loaded file (for conflict detection)
  let pkceVerifier = null;   // kept in memory between Connect and Finish
  function cloudConnected() { return !!(cloud.refreshToken && cloud.appKey); }

  // --- PKCE helpers ---
  function b64url(bytes) { let s = ""; bytes.forEach(b => s += String.fromCharCode(b)); return btoa(s).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, ""); }
  function randString(n) { const a = new Uint8Array(n); crypto.getRandomValues(a); return b64url(a); }
  async function pkceChallenge(verifier) {
    if (window.crypto && crypto.subtle) {
      try {
        const dig = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier));
        return { method: "S256", challenge: b64url(new Uint8Array(dig)) };
      } catch (_) {}
    }
    return { method: "plain", challenge: verifier }; // fallback if SubtleCrypto unavailable
  }
  async function dbxErr(res) { try { return (await res.text()) || ("HTTP " + res.status); } catch (_) { return "HTTP " + res.status; } }

  // --- OAuth: connect / refresh ---
  async function startConnect() {
    const key = $("c-appkey").value.trim();
    if (!key) { toast("Enter your Dropbox app key first"); return; }
    cloud.appKey = key; persistCloud();
    pkceVerifier = randString(48);
    const { method, challenge } = await pkceChallenge(pkceVerifier);
    const url = "https://www.dropbox.com/oauth2/authorize"
      + "?client_id=" + encodeURIComponent(key)
      + "&response_type=code&token_access_type=offline"
      + "&code_challenge=" + encodeURIComponent(challenge)
      + "&code_challenge_method=" + method;
    window.open(url, "_blank", "noopener");
    $("c-code-row").style.display = "";
    setCloudStatus("Authorize in the new tab, then paste the code below.", "");
  }
  async function finishConnect() {
    const code = $("c-code").value.trim();
    if (!code) { toast("Paste the authorization code"); return; }
    if (!pkceVerifier) { toast("Click Connect first"); return; }
    setCloudStatus("Connecting…", "");
    try {
      const body = new URLSearchParams({ code, grant_type: "authorization_code", client_id: cloud.appKey, code_verifier: pkceVerifier });
      const res = await fetch("https://api.dropboxapi.com/oauth2/token", { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body });
      if (!res.ok) throw new Error(await dbxErr(res));
      const j = await res.json();
      cloud.refreshToken = j.refresh_token || cloud.refreshToken;
      cloud.accessToken = j.access_token;
      cloud.accessExpiry = Date.now() + (j.expires_in || 14400) * 1000;
      persistCloud();
      $("c-code-row").style.display = "none"; $("c-code").value = "";
      updateCloudUI();
      toast("Connected to Dropbox ✓");
      const p = $("c-path").value.trim();
      if (p) { cloud.path = p; persistCloud(); loadFromCloud(); }
    } catch (err) {
      setCloudStatus("Connect failed: " + err.message, "err");
      toast("Connect failed: " + err.message);
    }
  }
  async function ensureAccessToken() {
    if (cloud.accessToken && Date.now() < (cloud.accessExpiry || 0) - 60000) return cloud.accessToken;
    if (!cloud.refreshToken) throw new Error("not connected");
    const body = new URLSearchParams({ grant_type: "refresh_token", refresh_token: cloud.refreshToken, client_id: cloud.appKey });
    const res = await fetch("https://api.dropboxapi.com/oauth2/token", { method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body });
    if (!res.ok) throw new Error("token refresh failed: " + await dbxErr(res));
    const j = await res.json();
    cloud.accessToken = j.access_token;
    cloud.accessExpiry = Date.now() + (j.expires_in || 14400) * 1000;
    persistCloud();
    return cloud.accessToken;
  }

  // --- file load / save ---
  async function loadFromCloud() {
    if (!cloudConnected()) { toast("Connect Dropbox first"); openCloud(); return; }
    const path = cloud.path;
    if (!path) { toast("Set a file path first"); openCloud(); return; }
    setCloudStatus("Loading " + path + " …", "");
    try {
      const at = await ensureAccessToken();
      const res = await fetch("https://content.dropboxapi.com/2/files/download", {
        method: "POST",
        headers: { "Authorization": "Bearer " + at, "Dropbox-API-Arg": JSON.stringify({ path }) }
      });
      if (res.status === 409) { // path/not_found → treat as a new, empty file
        cloudRev = null;
        setCloudStatus("No file at " + path + " yet — Save to create it.", "");
        toast("No file yet — Save to create it");
        return;
      }
      if (!res.ok) throw new Error(await dbxErr(res));
      const text = await res.text();
      let meta = {}; try { meta = JSON.parse(res.headers.get("Dropbox-API-Result") || "{}"); } catch (_) {}
      cloudRev = meta.rev || null;
      const data = JSON.parse(text);
      if (!data.tasks) throw new Error("that file isn't a Gantt JSON");
      state = normalize(data);
      clearDirty(); updateViewButtons(); render();
      setCloudStatus("Loaded " + path + (cloudRev ? " (rev " + cloudRev.slice(0, 6) + ")" : ""), "ok");
      toast("Loaded from Dropbox ✓");
    } catch (err) {
      setCloudStatus("Load failed: " + err.message, "err");
      toast("Cloud load failed: " + err.message);
    }
  }
  async function saveToCloud(force) {
    if (!cloudConnected()) { toast("Connect Dropbox first"); openCloud(); return; }
    const path = cloud.path;
    if (!path) { toast("Set a file path first"); openCloud(); return; }
    setCloudStatus("Saving " + path + " …", "");
    try {
      const at = await ensureAccessToken();
      const arg = { path, mode: (cloudRev && !force) ? { ".tag": "update", update: cloudRev } : "overwrite", mute: true, autorename: false };
      const res = await fetch("https://content.dropboxapi.com/2/files/upload", {
        method: "POST",
        headers: { "Authorization": "Bearer " + at, "Dropbox-API-Arg": JSON.stringify(arg), "Content-Type": "application/octet-stream" },
        body: serialize()
      });
      if (res.status === 409) { // likely a write-conflict (someone else saved)
        const txt = await res.text();
        if (/conflict/.test(txt)) {
          const reload = window.confirm("This file changed in Dropbox since you loaded it.\n\nOK = reload the remote version (discard your local edits)\nCancel = keep your version (Save again to overwrite remote).");
          if (reload) { await loadFromCloud(); }
          else { cloudRev = null; setCloudStatus("Kept local copy — Save again to overwrite remote.", "err"); }
          return;
        }
        throw new Error(txt);
      }
      if (!res.ok) throw new Error(await dbxErr(res));
      const meta = await res.json();
      cloudRev = meta.rev || null;
      clearDirty();
      setCloudStatus("Saved " + path + (cloudRev ? " (rev " + cloudRev.slice(0, 6) + ")" : ""), "ok");
      toast("Saved to Dropbox ✓");
    } catch (err) {
      setCloudStatus("Save failed: " + err.message, "err");
      toast("Cloud save failed: " + err.message);
    }
  }

  // --- cloud UI ---
  function setCloudStatus(msg, kind) { const el = $("c-status"); el.textContent = msg; el.className = "c-status" + (kind ? (" " + kind) : ""); }
  function updateCloudUI() {
    const conn = cloudConnected();
    document.body.classList.toggle("cloud-on", conn);
    $("c-connect-row").style.display = conn ? "none" : "";
    $("c-disconnect").style.display = conn ? "" : "none";
    if (conn) setCloudStatus("Connected" + (cloud.path ? " · " + cloud.path : " · set a file path below"), "ok");
    else setCloudStatus("Not connected.", "");
  }
  function openCloud() { $("c-appkey").value = cloud.appKey || ""; $("c-path").value = cloud.path || ""; updateCloudUI(); $("cloud-overlay").classList.add("show"); }
  function closeCloud() { $("cloud-overlay").classList.remove("show"); }

  $("cloud-btn").addEventListener("click", openCloud);
  $("c-close").addEventListener("click", closeCloud);
  $("cloud-overlay").addEventListener("click", (e) => { if (e.target === $("cloud-overlay")) closeCloud(); });
  $("c-connect").addEventListener("click", startConnect);
  $("c-finish").addEventListener("click", finishConnect);
  $("c-load").addEventListener("click", () => { cloud.path = $("c-path").value.trim(); persistCloud(); cloudRev = null; loadFromCloud(); });
  $("c-save").addEventListener("click", () => { cloud.path = $("c-path").value.trim(); persistCloud(); saveToCloud(); });
  $("c-disconnect").addEventListener("click", () => {
    cloud.refreshToken = ""; cloud.accessToken = ""; cloud.accessExpiry = 0; persistCloud();
    cloudRev = null; updateCloudUI(); toast("Disconnected from Dropbox");
  });
  $("c-path").addEventListener("change", () => { cloud.path = $("c-path").value.trim(); persistCloud(); updateCloudUI(); });

  // ---------------------------------------------------------------------------
  // Data load / normalize
  // ---------------------------------------------------------------------------
  function loadState() {
    try {
      const raw = document.getElementById("gantt-data").textContent.trim();
      return normalize(JSON.parse(raw));
    } catch (e) {
      return normalize({ version: 1, settings: { viewMode: "week" }, groups: [], tasks: [] });
    }
  }
  function normalize(data) {
    const s = {
      version: 1,
      settings: { viewMode: (data.settings && data.settings.viewMode) || "week" },
      groups: Array.isArray(data.groups) ? data.groups : [],
      tasks: Array.isArray(data.tasks) ? data.tasks : []
    };
    if (!VIEW[s.settings.viewMode]) s.settings.viewMode = "week";
    s.tasks.forEach(t => {
      t.deps = Array.isArray(t.deps) ? t.deps : [];
      t.progress = typeof t.progress === "number" ? t.progress : 0;
      t.isMilestone = !!t.isMilestone;
      if (!t.end) t.end = t.start;
      if (!t.id) t.id = uid("t");
    });
    return s;
  }

  // ---------------------------------------------------------------------------
  // Misc utils
  // ---------------------------------------------------------------------------
  let _counter = 0;
  function uid(prefix) { return prefix + Date.now().toString(36) + (_counter++).toString(36); }
  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function fmtShort(dt) { return `${dt.getDate()} ${MONTHS[dt.getMonth()]}`; }
  const COLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316"];
  function pickColor() { return COLORS[state.groups.length % COLORS.length]; }

  let toastTimer = null;
  function toast(msg, actionLabel, actionFn) {
    const t = $("toast");
    t.innerHTML = "";
    t.appendChild(document.createTextNode(msg));
    if (actionLabel && actionFn) {
      const b = document.createElement("button");
      b.className = "toast-btn"; b.textContent = actionLabel;
      b.addEventListener("click", () => { actionFn(); t.classList.remove("show"); });
      t.appendChild(b);
    }
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), actionLabel ? 6000 : 2600);
  }
  function snapshot() { return JSON.parse(JSON.stringify(state)); }
  function restoreState(snap) { state = snap; markDirty(); updateViewButtons(); render(); }

  // ---------------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------------
  function init() {
    if (!supportsFS && !cloudConnected()) {
      const b = $("save-mode-banner");
      if (location.protocol === "file:") {
        // Chrome/Edge DO support in-place save, but the browser blocks the API on file:// pages.
        b.innerHTML = '⚠️ <b>In-place saving is disabled because this page was opened directly from a file</b> ' +
          '(<code>file://</code>). For now, <b>Save</b> downloads an updated copy. ' +
          'To save back into the same file, open it via <code>http://localhost</code> in Chrome/Edge — ' +
          'just double-click <code>serve.command</code> in this folder (see README).';
      } else {
        b.textContent = "This browser doesn't support writing files in place. \"Save\" downloads a fresh gantt.html that you drop into your shared folder. For in-place saving, open it in Chrome or Edge.";
      }
      b.classList.add("show");
    }
    renderSwatches();
    updateCloudUI();
    updateViewButtons();
    render();
    // scroll to today on load
    requestAnimationFrame(() => {
      const x = dateToX(today());
      chartPane.scrollLeft = Math.max(0, x - chartPane.clientWidth/2);
    });
    // cloud-only: if configured, pull the latest from Dropbox on open
    if (cloudConnected() && cloud.path) loadFromCloud();
  }
  init();
})();
</script>
</body>
</html>

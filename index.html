<!-- =================== EMBEDDED DATA (saved in place) =================== -->
<script type="application/json" id="gantt-data">
{"version":1,"settings":{"viewMode":"week"},"groups":[],"tasks":[]}
</script>
<!-- =================== /EMBEDDED DATA =================== -->

<script>
"use strict";
(function () {
  // ---------------------------------------------------------------------------
  // Constants & geometry
  // ---------------------------------------------------------------------------
  const ROW_H = 38;
  const BAR_H = 22;
  const BAR_PAD = (ROW_H - BAR_H) / 2;
  const VIEW = {
    day:   { dayWidth: 46 },
    week:  { dayWidth: 22 },
    month: { dayWidth: 7  }
  };
  const DAY_MS = 86400000;
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------
  let state = loadState();
  let fileHandle = null;          // FileSystemFileHandle (Chrome/Edge)
  let dirty = false;
  let selectedId = null;          // primary selection (editor / copy / delete target)
  let selectedIds = new Set();    // multi-selection: tasks tagged to move together
  let editingId = null;           // task id open in editor (null = new)
  let editingGroupId = null;
  let rangeStart = null, rangeEnd = null;  // Date objects defining the visible timeline (grows on scroll)
  let lastColor = null;                    // remembers the last custom color picked, to reuse on new tasks
  let dragging = false;                    // true while a bar/milestone/row drag is in progress (pauses cloud refresh)
  let locked = true;                       // app starts view-only every launch; click the lock button to edit
  // collapsed groups, remembered per board in localStorage ("cookie")
  const COLLAPSE_KEY = "gantt_collapsed_v1";
  let collapsedMap = (() => { try { return JSON.parse(localStorage.getItem(COLLAPSE_KEY) || "{}"); } catch (_) { return {}; } })();
  function boardKey() { return cloud.binId || "local"; }
  function isCollapsed(gid) { return (collapsedMap[boardKey()] || []).includes(gid); }
  function toggleCollapse(gid) {
    const k = boardKey(), set = new Set(collapsedMap[k] || []);
    set.has(gid) ? set.delete(gid) : set.add(gid);
    collapsedMap[k] = [...set];
    try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapsedMap)); } catch (_) {}
    render();
  }

  const supportsFS = typeof window.showSaveFilePicker === "function";

  // ---------------------------------------------------------------------------
  // DOM refs
  // ---------------------------------------------------------------------------
  const $ = (id) => document.getElementById(id);
  const listInner = $("list-inner");
  const listBody  = $("list-body");
  const chartPane = $("chart-pane");
  const chartHeader = $("chart-header");
  const chartBody = $("chart-body");
  const depSvg = $("dep-svg");
  const todayLine = $("today-line");

  // ---------------------------------------------------------------------------
  // Date helpers (work in local time, date-only)
  // ---------------------------------------------------------------------------
  function parseD(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); }
  function fmtD(dt) {
    const y = dt.getFullYear(), m = String(dt.getMonth()+1).padStart(2,"0"), d = String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  function addDays(dt, n) { const r = new Date(dt); r.setDate(r.getDate()+n); return r; }
  function diffDays(a, b) { return Math.round((stripTime(b) - stripTime(a)) / DAY_MS); }
  function stripTime(dt) { return new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()); }
  function today() { return stripTime(new Date()); }

  // ---------------------------------------------------------------------------
  // Geometry: date <-> x
  // ---------------------------------------------------------------------------
  function dayWidth() { return VIEW[state.settings.viewMode].dayWidth; }
  function dateToX(dt) { return diffDays(rangeStart, dt) * dayWidth(); }
  function xToDate(x) { return addDays(rangeStart, Math.round(x / dayWidth())); }
  function totalDays() { return diffDays(rangeStart, rangeEnd) + 1; }
  function chartWidth() { return totalDays() * dayWidth(); }

  const INITIAL_PAD = 180; // days of timeline padding on each side at first layout
  function ensureRange() {
    let min = null, max = null;
    for (const t of state.tasks) {
      const s = parseD(t.start), e = parseD(t.isMilestone ? t.start : t.end);
      if (!min || s < min) min = s;
      if (!max || e > max) max = e;
    }
    const t = today();
    if (!min) { min = t; max = t; }
    if (t < min) min = t;
    if (t > max) max = t;
    let desiredStart = addDays(min, -INITIAL_PAD);
    let desiredEnd = addDays(max, INITIAL_PAD);
    // align start to a Sunday for clean week columns (Israeli week starts Sunday)
    desiredStart = addDays(desiredStart, -desiredStart.getDay());
    // Grow only — never shrink an already-extended window. This keeps the
    // timeline endless: scroll-driven extensions are preserved across renders.
    if (!rangeStart || desiredStart < rangeStart) rangeStart = desiredStart;
    if (!rangeEnd || desiredEnd > rangeEnd) rangeEnd = desiredEnd;
  }

  // ---------------------------------------------------------------------------
  // Ordered rows: groups followed by their tasks (matches list & chart)
  // ---------------------------------------------------------------------------
  function orderedRows() {
    const rows = [];
    const used = new Set();
    for (const g of state.groups) {
      const count = state.tasks.filter(t => t.groupId === g.id).length;
      rows.push({ type: "group", group: g, count });
      state.tasks.forEach(t => { if (t.groupId === g.id) used.add(t.id); });
      if (isCollapsed(g.id)) continue; // collapsed: skip its task rows (in both list and chart)
      for (const t of state.tasks) {
        if (t.groupId === g.id) rows.push({ type: "task", task: t, group: g });
      }
    }
    const orphans = state.tasks.filter(t => !used.has(t.id));
    if (orphans.length) {
      const ng = { id: "__none", name: "Ungrouped", color: "#94a3b8" };
      rows.push({ type: "group", group: ng, count: orphans.length });
      if (!isCollapsed("__none")) {
        for (const t of orphans) rows.push({ type: "task", task: t, group: { color: "#94a3b8" } });
      }
    }
    return rows;
  }
  function rowIndexOfTask(id, rows) { return rows.findIndex(r => r.type === "task" && r.task.id === id); }

  // ---------------------------------------------------------------------------
  // Render
  // ---------------------------------------------------------------------------
  function render() {
    ensureRange();
    const rows = orderedRows();
    const w = chartWidth();
    const h = rows.length * ROW_H;

    renderList(rows);
    renderHeader(w);
    renderGrid(rows, w, h);
    renderBars(rows, w, h);
    renderDeps(rows);
    positionTodayLine(h);

    chartBody.style.width = w + "px";
    chartBody.style.height = h + "px";
    chartHeader.style.width = w + "px";
    $("chart-inner").style.width = w + "px";
  }

  // ---------------------------------------------------------------------------
  // List drag-to-reorder
  // ---------------------------------------------------------------------------
  let dragTaskId = null;
  function clearDropMarks() {
    listInner.querySelectorAll(".drop-before, .drop-after, .drop-into")
      .forEach(e => e.classList.remove("drop-before", "drop-after", "drop-into"));
  }
  function reorderTaskRelativeTo(targetTask, after) {
    if (!dragTaskId || dragTaskId === targetTask.id) return;
    const dragged = state.tasks.find(x => x.id === dragTaskId);
    if (!dragged) return;
    state.tasks = state.tasks.filter(x => x.id !== dragTaskId);
    dragged.groupId = targetTask.groupId; // adopt the target's group (supports cross-group moves)
    let idx = state.tasks.findIndex(x => x.id === targetTask.id);
    if (idx < 0) idx = state.tasks.length;
    if (after) idx += 1;
    state.tasks.splice(idx, 0, dragged);
    markDirty(); render();
  }
  function moveTaskToGroupTop(groupId) {
    if (!dragTaskId) return;
    const dragged = state.tasks.find(x => x.id === dragTaskId);
    if (!dragged) return;
    state.tasks = state.tasks.filter(x => x.id !== dragTaskId);
    dragged.groupId = (groupId === "__none") ? null : groupId;
    const idx = state.tasks.findIndex(x => x.groupId === dragged.groupId);
    if (idx < 0) state.tasks.push(dragged); else state.tasks.splice(idx, 0, dragged);
    markDirty(); render();
  }

  function renderList(rows) {
    listInner.innerHTML = "";
    for (const r of rows) {
      const el = document.createElement("div");
      if (r.type === "group") {
        el.className = "list-row group-head";
        const col = isCollapsed(r.group.id);
        el.innerHTML = `<span class="caret" title="${col ? "Expand" : "Collapse"}">${col ? "▸" : "▾"}</span>
                        <span class="swatch" style="background:${r.group.color}"></span>
                        <span class="nm">${esc(r.group.name)}</span>` +
                        (col ? `<span class="meta">${r.count}</span>` : "");
        // caret toggles collapse (works even in view-only mode)
        el.querySelector(".caret").addEventListener("click", (e) => { e.stopPropagation(); toggleCollapse(r.group.id); });
        if (r.group.id !== "__none") {
          el.style.cursor = "pointer";
          el.title = "Edit group";
          el.addEventListener("click", () => openGroupEditor(r.group.id));
          const add = document.createElement("button");
          add.className = "grp-add";
          add.textContent = "+";
          add.title = "Add task to this group";
          add.addEventListener("click", (e) => { e.stopPropagation(); openEditor(null, r.group.id); });
          el.appendChild(add);
        }
        // drop a task onto a group header to move it into that group
        el.addEventListener("dragover", (e) => { if (!dragTaskId) return; e.preventDefault(); el.classList.add("drop-into"); });
        el.addEventListener("dragleave", () => el.classList.remove("drop-into"));
        el.addEventListener("drop", (e) => { e.preventDefault(); el.classList.remove("drop-into"); moveTaskToGroupTop(r.group.id); });
      } else {
        const t = r.task;
        el.className = "list-row task-row" + (isSelected(t.id) ? " sel" : "");
        el.dataset.id = t.id;
        const mark = t.isMilestone ? "◆ " : "";
        el.innerHTML = `<span class="swatch" style="background:${t.color || r.group.color}"></span>
                        <span class="nm">${mark}${esc(t.name)}</span>`;
        el.addEventListener("click", (e) => {
          if (e.shiftKey || e.metaKey || e.ctrlKey) { toggleSelection(t.id); return; }
          openEditor(t.id);
        });
        // drag to reorder (disabled while view-only)
        el.draggable = !locked;
        el.addEventListener("dragstart", (e) => {
          if (locked) { e.preventDefault(); return; }
          dragTaskId = t.id; dragging = true;
          if (e.dataTransfer) {
            e.dataTransfer.effectAllowed = "move";
            try { e.dataTransfer.setData("text/plain", t.id); } catch (_) {}
          }
          el.classList.add("dragging");
        });
        el.addEventListener("dragend", () => { el.classList.remove("dragging"); clearDropMarks(); dragTaskId = null; dragging = false; });
        el.addEventListener("dragover", (e) => {
          if (!dragTaskId || dragTaskId === t.id) return;
          e.preventDefault();
          const rect = el.getBoundingClientRect();
          const after = (e.clientY - rect.top) > rect.height / 2;
          clearDropMarks(); el.classList.add(after ? "drop-after" : "drop-before");
        });
        el.addEventListener("dragleave", () => el.classList.remove("drop-before", "drop-after"));
        el.addEventListener("drop", (e) => {
          e.preventDefault();
          const rect = el.getBoundingClientRect();
          const after = (e.clientY - rect.top) > rect.height / 2;
          clearDropMarks(); reorderTaskRelativeTo(t, after);
        });
      }
      listInner.appendChild(el);
    }
  }

  function renderHeader(w) {
    chartHeader.innerHTML = "";
    const vm = state.settings.viewMode;
    const dw = dayWidth();
    const n = totalDays();

    if (vm === "day") {
      for (let i = 0; i < n; i++) {
        const d = addDays(rangeStart, i);
        const cell = hdrCell(i*dw, dw);
        cell.innerHTML = `<span>${DOW[d.getDay()]}</span><span class="big">${d.getDate()}</span>`;
        if (d.getDate() === 1) cell.innerHTML = `<span>${MONTHS[d.getMonth()]}</span><span class="big">${d.getDate()}</span>`;
        chartHeader.appendChild(cell);
      }
    } else if (vm === "week") {
      // week cells (7 days), label = month + start date
      for (let i = 0; i < n; i += 7) {
        const d = addDays(rangeStart, i);
        const cell = hdrCell(i*dw, dw*7);
        cell.innerHTML = `<span>${MONTHS[d.getMonth()]}</span><span class="big">${d.getDate()}</span>`;
        chartHeader.appendChild(cell);
      }
    } else { // month
      let i = 0;
      while (i < n) {
        const d = addDays(rangeStart, i);
        const monthStart = new Date(d.getFullYear(), d.getMonth(), 1);
        const monthEnd = new Date(d.getFullYear(), d.getMonth()+1, 0);
        const fromIdx = Math.max(0, diffDays(rangeStart, monthStart));
        const span = Math.min(n, diffDays(rangeStart, monthEnd)+1) - fromIdx;
        const cell = hdrCell(fromIdx*dw, span*dw);
        cell.innerHTML = `<span class="big">${MONTHS[d.getMonth()]} ${d.getFullYear()}</span>`;
        chartHeader.appendChild(cell);
        i = fromIdx + span;
      }
    }
  }
  function hdrCell(left, width) {
    const c = document.createElement("div");
    c.className = "hdr-cell";
    c.style.left = left + "px";
    c.style.width = width + "px";
    return c;
  }

  function renderGrid(rows, w, h) {
    // remove old grid cols & row lines
    chartBody.querySelectorAll(".grid-col, .row-line").forEach(e => e.remove());
    const vm = state.settings.viewMode;
    const dw = dayWidth();
    const n = totalDays();

    // vertical columns
    if (vm === "day" || vm === "week") {
      for (let i = 0; i < n; i++) {
        const d = addDays(rangeStart, i);
        const col = document.createElement("div");
        col.className = "grid-col";
        if (d.getDay() === 5 || d.getDay() === 6) col.classList.add("weekend"); // Fri–Sat (Israel)
        if (d.getDate() === 1) col.classList.add("month-start");
        col.style.left = (i*dw) + "px";
        col.style.width = dw + "px";
        chartBody.appendChild(col);
      }
    } else {
      let i = 0;
      while (i < n) {
        const d = addDays(rangeStart, i);
        const monthEnd = new Date(d.getFullYear(), d.getMonth()+1, 0);
        const span = Math.min(n, diffDays(rangeStart, monthEnd)+1) - i;
        const col = document.createElement("div");
        col.className = "grid-col month-start";
        col.style.left = (i*dw) + "px";
        col.style.width = (span*dw) + "px";
        chartBody.appendChild(col);
        i += span;
      }
    }

    // horizontal row lines
    rows.forEach((r, idx) => {
      const line = document.createElement("div");
      line.className = "row-line" + (r.type === "group" ? " group" : "");
      line.style.top = (idx*ROW_H) + "px";
      chartBody.appendChild(line);
    });
  }

  function renderBars(rows, w, h) {
    // remove old bars / milestones / labels
    chartBody.querySelectorAll(".bar, .milestone, .ms-label").forEach(e => e.remove());
    const dw = dayWidth();
    rows.forEach((r, idx) => {
      if (r.type === "group") {
        // When a group is collapsed its task rows are hidden, so draw a single
        // rollup bar on the group header row spanning its tasks' date range.
        if (!isCollapsed(r.group.id)) return;
        const members = state.tasks.filter(t => t.groupId === r.group.id
          || (r.group.id === "__none" && !state.groups.some(g => g.id === t.groupId)));
        if (!members.length) return;
        let min = null, max = null;
        for (const t of members) {
          const s = parseD(t.start);
          const e = t.isMilestone ? s : parseD(t.end);
          if (!min || s < min) min = s;
          if (!max || e > max) max = e;
        }
        const top = idx*ROW_H;
        const x = dateToX(min);
        const days = Math.max(1, diffDays(min, max) + 1);
        const sum = document.createElement("div");
        sum.className = "bar group-summary";
        sum.style.left = x + "px";
        sum.style.top = (top + (ROW_H - 10) / 2) + "px";
        sum.style.width = (days * dw) + "px";
        sum.style.background = r.group.color;
        chartBody.appendChild(sum);
        return;
      }
      if (r.type !== "task") return;
      const t = r.task;
      const top = idx*ROW_H;
      if (t.isMilestone) {
        const x = dateToX(parseD(t.start));
        const m = document.createElement("div");
        m.className = "milestone" + (isSelected(t.id) ? " selected" : "");
        m.style.left = (x - 9) + "px";
        m.style.top = (top + (ROW_H-18)/2) + "px";
        m.style.background = t.color || r.group.color;
        m.dataset.id = t.id;
        chartBody.appendChild(m);
        const lbl = document.createElement("div");
        lbl.className = "ms-label";
        lbl.textContent = t.name;
        lbl.style.left = (x + 14) + "px";
        lbl.style.top = (top + (ROW_H-14)/2) + "px";
        chartBody.appendChild(lbl);
        attachMilestoneDrag(m, t);
      } else {
        const x = dateToX(parseD(t.start));
        const days = Math.max(1, diffDays(parseD(t.start), parseD(t.end)) + 1);
        const bw = days * dw;
        const bar = document.createElement("div");
        bar.className = "bar" + (isSelected(t.id) ? " selected" : "");
        bar.style.left = x + "px";
        bar.style.top = (top + BAR_PAD) + "px";
        bar.style.width = bw + "px";
        bar.style.background = t.color || r.group.color;
        bar.dataset.id = t.id;
        bar.innerHTML = `<div class="fill" style="width:${t.progress}%"></div>
                         <div class="handle l"></div>
                         <span class="label">${esc(t.name)}</span>
                         <div class="handle r"></div>`;
        chartBody.appendChild(bar);
        attachBarDrag(bar, t);
      }
    });
  }

  function renderDeps(rows) {
    while (depSvg.firstChild) depSvg.removeChild(depSvg.firstChild);
    const NS = "http://www.w3.org/2000/svg";
    const GAP = 5;   // distance the arrowhead stops before the target
    const STUB = 14; // short horizontal segment leaving the predecessor
    for (const t of state.tasks) {
      if (!t.deps || !t.deps.length) continue;
      const toIdx = rowIndexOfTask(t.id, rows);
      if (toIdx < 0) continue;
      const toX = dateToX(parseD(t.start));
      const toY = toIdx*ROW_H + ROW_H/2;
      // entry point on the successor (left vertex for milestones); arrow points right
      const targetX = (t.isMilestone ? toX - 9 : toX) - GAP;
      for (const depId of t.deps) {
        const from = state.tasks.find(x => x.id === depId);
        if (!from) continue;
        const fromIdx = rowIndexOfTask(depId, rows);
        if (fromIdx < 0) continue;
        // exit point on the predecessor (right edge / right vertex for milestones)
        const x1 = from.isMilestone ? dateToX(parseD(from.start)) + 9
                                    : dateToX(addDays(parseD(from.end), 1));
        const y1 = fromIdx*ROW_H + ROW_H/2;
        // Smooth S-curve with horizontal tangents at both ends. The end tangent
        // points right, so the arrowhead always enters the successor cleanly —
        // works for forward, adjacent, overlapping, and backward links alike.
        const k = Math.max(STUB, Math.abs(targetX - x1) * 0.4 + 10);
        const d = `M ${x1} ${y1} C ${x1 + k} ${y1}, ${targetX - k} ${toY}, ${targetX} ${toY}`;
        const path = document.createElementNS(NS, "path");
        path.setAttribute("d", d);
        path.setAttribute("marker-end", "url(#arrow)");
        depSvg.appendChild(path);
      }
    }
    // arrow marker
    const defs = document.createElementNS(NS, "defs");
    defs.innerHTML = `<marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
        <path d="M0,0 L7,3.5 L0,7 Z" fill="#94a3b8" stroke="none"></path></marker>`;
    depSvg.appendChild(defs);
    depSvg.setAttribute("width", chartWidth());
    depSvg.setAttribute("height", rows.length*ROW_H);
  }

  function positionTodayLine(h) {
    const x = dateToX(today()) + dayWidth()/2;
    todayLine.style.left = x + "px";
    todayLine.style.height = h + "px";
  }

  // ---------------------------------------------------------------------------
  // Drag: move & resize bars
  // ---------------------------------------------------------------------------
  function attachBarDrag(bar, t) {
    const lh = bar.querySelector(".handle.l");
    const rh = bar.querySelector(".handle.r");
    lh.addEventListener("pointerdown", (e) => startResize(e, t, "l"));
    rh.addEventListener("pointerdown", (e) => startResize(e, t, "r"));
    bar.addEventListener("pointerdown", (e) => {
      if (e.target.classList.contains("handle")) return;
      startDrag(e, t, bar, false);
    });
    bar.addEventListener("dblclick", () => openEditor(t.id));
  }

  function attachMilestoneDrag(m, t) {
    m.addEventListener("pointerdown", (e) => startDrag(e, t, m, true));
    m.addEventListener("dblclick", () => openEditor(t.id));
  }

  // Unified bar/milestone drag. Ctrl/Cmd/Shift-click tags a task into the
  // multi-selection instead of dragging; a plain drag on any tagged task moves
  // the whole selection together by the same number of days.
  function startDrag(e, t, anchorEl, isMs) {
    const modifier = e.shiftKey || e.metaKey || e.ctrlKey;
    if (locked) { modifier ? toggleSelection(t.id) : select(t.id); return; }
    if (modifier) { e.preventDefault(); toggleSelection(t.id); return; }
    // Plain click on an untagged bar selects only it; on an already-tagged bar
    // it keeps the group so the drag moves everything.
    if (!isSelected(t.id)) select(t.id);
    e.preventDefault();
    dragging = true;
    const dw = dayWidth();
    const startX = e.clientX;
    // Snapshot every selected task that is currently on screen.
    const items = [...selectedIds].map(id => {
      const task = state.tasks.find(x => x.id === id);
      const el = chartBody.querySelector(`.bar[data-id="${id}"], .milestone[data-id="${id}"]`);
      if (!task || !el) return null;
      return { task, el, ms: el.classList.contains("milestone"),
               origStart: parseD(task.start), origEnd: parseD(task.end) };
    }).filter(Boolean);
    anchorEl.setPointerCapture(e.pointerId);
    function move(ev) {
      const delta = Math.round((ev.clientX - startX) / dw);
      for (const it of items) {
        const nx = dateToX(addDays(it.origStart, delta));
        it.el.style.left = (it.ms ? nx - 9 : nx) + "px";
      }
    }
    function up(ev) {
      dragging = false;
      anchorEl.releasePointerCapture(e.pointerId);
      anchorEl.removeEventListener("pointermove", move);
      anchorEl.removeEventListener("pointerup", up);
      const delta = Math.round((ev.clientX - startX) / dw);
      if (delta !== 0) {
        for (const it of items) {
          it.task.start = fmtD(addDays(it.origStart, delta));
          it.task.end = it.ms ? it.task.start : fmtD(addDays(it.origEnd, delta));
        }
        markDirty(); render();
      }
    }
    anchorEl.addEventListener("pointermove", move);
    anchorEl.addEventListener("pointerup", up);
  }

  function startResize(e, t, side) {
    if (locked) return;
    e.preventDefault(); e.stopPropagation();
    select(t.id);
    dragging = true;
    const dw = dayWidth();
    const startX = e.clientX;
    const origStart = parseD(t.start), origEnd = parseD(t.end);
    const target = e.target;
    target.setPointerCapture(e.pointerId);
    function move(ev) {
      const delta = Math.round((ev.clientX - startX) / dw);
      const bar = target.parentElement;
      if (side === "l") {
        const ns = addDays(origStart, Math.min(delta, diffDays(origStart, origEnd)));
        bar.style.left = dateToX(ns) + "px";
        bar.style.width = ((diffDays(ns, origEnd)+1)*dw) + "px";
      } else {
        const ne = addDays(origEnd, Math.max(delta, -diffDays(origStart, origEnd)));
        bar.style.width = ((diffDays(origStart, ne)+1)*dw) + "px";
      }
    }
    function up(ev) {
      dragging = false;
      target.releasePointerCapture(e.pointerId);
      target.removeEventListener("pointermove", move);
      target.removeEventListener("pointerup", up);
      const delta = Math.round((ev.clientX - startX) / dw);
      if (side === "l") {
        const ns = addDays(origStart, Math.min(delta, diffDays(origStart, origEnd)));
        t.start = fmtD(ns);
      } else {
        const ne = addDays(origEnd, Math.max(delta, -diffDays(origStart, origEnd)));
        t.end = fmtD(ne);
      }
      markDirty(); render();
    }
    target.addEventListener("pointermove", move);
    target.addEventListener("pointerup", up);
  }

  function isSelected(id) { return selectedIds.has(id); }

  // Replace the whole selection with a single task.
  function select(id) {
    selectedId = id;
    selectedIds = id == null ? new Set() : new Set([id]);
    refreshSelection();
  }

  // Add/remove one task from the selection (used for tagging several together).
  function toggleSelection(id) {
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      if (selectedId === id) selectedId = [...selectedIds].pop() || null;
    } else {
      selectedIds.add(id);
      selectedId = id;
    }
    refreshSelection();
  }

  // Sync the .selected / .sel classes in both chart and list to selectedIds.
  function refreshSelection() {
    chartBody.querySelectorAll(".bar, .milestone").forEach(el => {
      el.classList.toggle("selected", selectedIds.has(el.dataset.id));
    });
    listInner.querySelectorAll(".list-row.task-row").forEach(el => {
      el.classList.toggle("sel", selectedIds.has(el.dataset.id));
    });
  }

  // ---------------------------------------------------------------------------
  // Scroll sync (list <-> chart vertical)
  // ---------------------------------------------------------------------------
  let extending = false;
  const EDGE_PX = 400; // start extending when this close to an edge
  chartPane.addEventListener("scroll", () => {
    listInner.style.transform = `translateY(${-chartPane.scrollTop}px)`;
    if (extending) return;
    const dw = dayWidth();
    let addN = Math.ceil((chartPane.clientWidth * 1.5) / dw);
    addN = Math.ceil(addN / 7) * 7; // keep week columns aligned
    if (chartPane.scrollLeft < EDGE_PX) {
      // extend into the past; re-anchor scroll so the view doesn't jump
      extending = true;
      rangeStart = addDays(rangeStart, -addN);
      render();
      chartPane.scrollLeft += addN * dw;
      extending = false;
    } else if (chartPane.scrollLeft + chartPane.clientWidth > chartWidth() - EDGE_PX) {
      // extend into the future
      extending = true;
      rangeEnd = addDays(rangeEnd, addN);
      render();
      extending = false;
    }
  });

  // ---------------------------------------------------------------------------
  // Editor (task / milestone)
  // ---------------------------------------------------------------------------
  const edOverlay = $("editor-overlay");

  function openEditor(id, presetGroupId) {
    if (locked && !id) return; // can't add while view-only (existing items open read-only)
    editingId = id;
    const t = id ? state.tasks.find(x => x.id === id) : null;
    $("editor-title").textContent = id ? "Edit Task" : "New Task";

    // populate group select
    const gSel = $("f-group");
    gSel.innerHTML = state.groups.map(g => `<option value="${g.id}">${esc(g.name)}</option>`).join("")
                     || `<option value="">(no groups)</option>`;

    if (t) {
      $("f-name").value = t.name;
      $("f-group").value = t.groupId || (state.groups[0] && state.groups[0].id) || "";
      $("f-milestone").checked = !!t.isMilestone;
      $("f-start").value = t.start;
      $("f-end").value = t.end;
      $("f-progress").value = t.progress || 0;
      $("prog-val").textContent = t.progress || 0;
      $("f-use-color").checked = !!t.color;
      $("f-color").value = t.color || groupColorOf($("f-group").value);
      $("f-delete").style.display = "";
      $("f-duplicate").style.display = "";
    } else {
      const start = today();
      $("f-name").value = "";
      $("f-group").value = presetGroupId || (state.groups[0] && state.groups[0].id) || "";
      $("f-milestone").checked = false;
      $("f-start").value = fmtD(start);
      $("f-end").value = fmtD(addDays(start, 3));
      $("f-progress").value = 0;
      $("prog-val").textContent = 0;
      $("f-use-color").checked = !!lastColor;
      $("f-color").value = lastColor || groupColorOf($("f-group").value);
      $("f-delete").style.display = "none";
      $("f-duplicate").style.display = "none";
    }
    buildDepList(id);
    toggleMilestoneUI();
    syncColorUI();
    edOverlay.classList.add("show");
    setTimeout(() => $("f-name").focus(), 30);
  }

  function buildDepList(id) {
    const t = id ? state.tasks.find(x => x.id === id) : null;
    const deps = (t && t.deps) || [];
    const candidates = state.tasks.filter(x => x.id !== id);
    const box = $("f-deps");
    if (!candidates.length) { box.innerHTML = `<span style="color:var(--muted)">No other tasks yet.</span>`; return; }
    box.innerHTML = candidates.map(c =>
      `<label class="d"><input type="checkbox" value="${c.id}" ${deps.includes(c.id) ? "checked" : ""}>
       ${c.isMilestone ? "◆ " : ""}${esc(c.name)}</label>`).join("");
  }

  function toggleMilestoneUI() {
    const ms = $("f-milestone").checked;
    $("end-wrap").style.display = ms ? "none" : "";
    $("progress-wrap").style.display = ms ? "none" : "";
  }
  function groupColorOf(gid) { const g = state.groups.find(x => x.id === gid); return g ? g.color : "#94a3b8"; }
  function renderSwatches() {
    const box = $("f-swatches");
    box.innerHTML = "";
    COLORS.forEach(c => {
      const b = document.createElement("button");
      b.type = "button"; b.className = "sw"; b.style.background = c; b.dataset.color = c; b.title = c;
      b.addEventListener("click", () => {
        $("f-color").value = c; $("f-use-color").checked = true; syncColorUI();
      });
      box.appendChild(b);
    });
  }
  function syncColorUI() {
    const custom = $("f-use-color").checked;
    $("f-color").disabled = !custom;
    $("f-color").style.opacity = custom ? "1" : ".5";
    const cur = ($("f-color").value || "").toLowerCase();
    $("f-swatches").querySelectorAll(".sw").forEach(b =>
      b.classList.toggle("sel", custom && b.dataset.color.toLowerCase() === cur));
  }
  $("f-milestone").addEventListener("change", toggleMilestoneUI);
  $("f-progress").addEventListener("input", () => $("prog-val").textContent = $("f-progress").value);
  $("f-use-color").addEventListener("change", () => {
    if (!$("f-use-color").checked) $("f-color").value = groupColorOf($("f-group").value);
    syncColorUI();
  });
  $("f-color").addEventListener("input", () => { $("f-use-color").checked = true; syncColorUI(); });
  $("f-group").addEventListener("change", () => {
    if (!$("f-use-color").checked) { $("f-color").value = groupColorOf($("f-group").value); syncColorUI(); }
  });

  function closeEditor() { edOverlay.classList.remove("show"); editingId = null; }

  $("f-cancel").addEventListener("click", closeEditor);
  edOverlay.addEventListener("click", (e) => { if (e.target === edOverlay) closeEditor(); });

  $("f-save").addEventListener("click", () => {
    if (locked) return;
    const name = $("f-name").value.trim() || "Untitled";
    const isMs = $("f-milestone").checked;
    let start = $("f-start").value || fmtD(today());
    let end = isMs ? start : ($("f-end").value || start);
    if (!isMs && parseD(end) < parseD(start)) end = start;
    const groupId = $("f-group").value || null;
    const progress = isMs ? 0 : Number($("f-progress").value);
    const deps = Array.from($("f-deps").querySelectorAll("input:checked")).map(i => i.value);
    const color = $("f-use-color").checked ? $("f-color").value : null;
    if (color) lastColor = color; // reuse this color as the default for the next new task

    if (editingId) {
      const t = state.tasks.find(x => x.id === editingId);
      Object.assign(t, { name, groupId, start, end, progress, isMilestone: isMs, deps, color });
    } else {
      state.tasks.push({ id: uid("t"), name, groupId, start, end, progress, isMilestone: isMs, deps, color });
    }
    markDirty(); closeEditor(); render();
  });

  $("f-delete").addEventListener("click", () => {
    if (!editingId) return;
    const snap = snapshot();
    const id = editingId;
    state.tasks = state.tasks.filter(x => x.id !== id);
    // clean up dependencies referencing it
    state.tasks.forEach(t => { if (t.deps) t.deps = t.deps.filter(d => d !== id); });
    selectedIds.delete(id);
    if (selectedId === id) selectedId = null;
    markDirty(); closeEditor(); render();
    toast("Task deleted", "Undo", () => restoreState(snap));
  });

  $("f-duplicate").addEventListener("click", () => {
    if (!editingId) return;
    const orig = state.tasks.find(x => x.id === editingId);
    if (!orig) return;
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id = uid("t");
    copy.name = orig.name + " (copy)";
    copy.deps = Array.isArray(orig.deps) ? orig.deps.slice() : [];
    const idx = state.tasks.findIndex(x => x.id === editingId);
    state.tasks.splice(idx + 1, 0, copy); // place right after the original
    selectedId = copy.id;
    selectedIds = new Set([copy.id]);
    markDirty(); closeEditor(); render();
    toast("Task duplicated");
  });

  // ---------------------------------------------------------------------------
  // Group editor
  // ---------------------------------------------------------------------------
  const gOverlay = $("group-overlay");
  function openGroupEditor(id) {
    if (locked) return; // view-only
    editingGroupId = id || null;
    const g = id ? state.groups.find(x => x.id === id) : null;
    $("group-title").textContent = id ? "Edit Group" : "Add Group";
    $("g-name").value = g ? g.name : "";
    $("g-color").value = g ? g.color : pickColor();
    $("g-delete").style.display = id ? "" : "none";
    gOverlay.classList.add("show");
    setTimeout(() => $("g-name").focus(), 30);
  }
  function closeGroupEditor() { gOverlay.classList.remove("show"); editingGroupId = null; }
  $("g-cancel").addEventListener("click", closeGroupEditor);
  gOverlay.addEventListener("click", (e) => { if (e.target === gOverlay) closeGroupEditor(); });
  $("g-save").addEventListener("click", () => {
    const name = $("g-name").value.trim() || "Group";
    const color = $("g-color").value;
    if (editingGroupId) {
      Object.assign(state.groups.find(x => x.id === editingGroupId), { name, color });
    } else {
      state.groups.push({ id: uid("g"), name, color });
    }
    markDirty(); closeGroupEditor(); render();
  });
  $("g-delete").addEventListener("click", () => {
    if (!editingGroupId) return;
    const snap = snapshot();
    const gid = editingGroupId;
    const childIds = state.tasks.filter(t => t.groupId === gid).map(t => t.id);
    const removed = new Set(childIds);
    state.tasks = state.tasks.filter(t => !removed.has(t.id));
    // clean up dependencies in remaining tasks that pointed at the deleted ones
    state.tasks.forEach(t => { if (t.deps) t.deps = t.deps.filter(d => !removed.has(d)); });
    removed.forEach(rid => selectedIds.delete(rid));
    if (removed.has(selectedId)) selectedId = null;
    state.groups = state.groups.filter(x => x.id !== gid);
    markDirty(); closeGroupEditor(); render();
    const n = childIds.length;
    toast(n ? `Group + ${n} task${n > 1 ? "s" : ""} deleted` : "Group deleted", "Undo", () => restoreState(snap));
  });

  // Escape clears the current multi-selection (when no editor is open).
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (edOverlay.classList.contains("show") || gOverlay.classList.contains("show")) return;
    if (selectedIds.size) select(null);
  });

  // Click empty chart space to clear the selection.
  chartBody.addEventListener("pointerdown", (e) => {
    if (dragging) return;
    if (e.target.closest(".bar, .milestone")) return;
    if (selectedIds.size) select(null);
  });

  // ---------------------------------------------------------------------------
  // Toolbar actions
  // ---------------------------------------------------------------------------
  $("add-task").addEventListener("click", () => openEditor(null));
  $("add-milestone").addEventListener("click", () => {
    openEditor(null);
    $("f-milestone").checked = true; toggleMilestoneUI();
    $("editor-title").textContent = "New Milestone";
  });
  $("add-group").addEventListener("click", () => openGroupEditor(null));
  $("today-btn").addEventListener("click", () => {
    const x = dateToX(today());
    chartPane.scrollTo({ left: Math.max(0, x - chartPane.clientWidth/2), behavior: "smooth" });
  });
  $("view-seg").addEventListener("click", (e) => {
    const b = e.target.closest("button"); if (!b) return;
    if (b.dataset.view === state.settings.viewMode) return;
    // remember the date currently centered in the viewport, then restore it
    const centerDate = xToDate(chartPane.scrollLeft + chartPane.clientWidth / 2);
    state.settings.viewMode = b.dataset.view;
    markDirty(); updateViewButtons(); render();
    chartPane.scrollLeft = Math.max(0, dateToX(centerDate) + dayWidth() / 2 - chartPane.clientWidth / 2);
  });
  function updateViewButtons() {
    $("view-seg").querySelectorAll("button").forEach(b =>
      b.classList.toggle("active", b.dataset.view === state.settings.viewMode));
  }

  // --- view-only (lock) mode ---
  function applyLockUI() {
    document.body.classList.toggle("locked", locked);
    const btn = $("lock-btn");
    btn.classList.toggle("locked", locked);
    btn.classList.toggle("editing", !locked);
    btn.textContent = locked ? "🔒 View only" : "🔓 Editing";
    btn.title = locked ? "Read-only — click to start editing" : "Editing — click to lock (view only)";
  }
  function toggleLock() {
    locked = !locked;
    if (locked) closeEditor();
    applyLockUI();
    render(); // refresh draggable state on list rows etc.
  }
  $("lock-btn").addEventListener("click", toggleLock);

  // ---------------------------------------------------------------------------
  // Persistence
  // ---------------------------------------------------------------------------
  function serialize() { return JSON.stringify(state); }

  function buildHtml() {
    // Clone the document and strip all runtime-generated DOM so the saved file
    // stays lean (it self-rebuilds on load). Then splice fresh JSON into the
    // data block via plain string replacement.
    const root = document.documentElement.cloneNode(true);
    const q = (sel) => root.querySelector(sel);
    const li = q("#list-inner");      if (li) li.innerHTML = "";
    const ch = q("#chart-header");    if (ch) ch.innerHTML = "";
    const cb = q("#chart-body");
    if (cb) cb.querySelectorAll(".grid-col, .row-line, .bar, .milestone, .ms-label").forEach(e => e.remove());
    const svg = q("#dep-svg");        if (svg) svg.innerHTML = "";
    // collapse open modals/toast so they don't persist as "shown"
    root.querySelectorAll(".overlay").forEach(o => o.classList.remove("show"));
    root.querySelectorAll(".toast").forEach(o => o.classList.remove("show"));
    if (root.querySelector("body")) root.querySelector("body").classList.remove("dirty");

    const html = "<!DOCTYPE html>\n<html lang=\"en\">" + root.innerHTML + "</html>\n";
    const open = '<script type="application/json" id="gantt-data">';
    const close = '<\/script>';
    const i = html.indexOf(open);
    if (i < 0) throw new Error("data block not found");
    const j = html.indexOf(close, i);
    if (j < 0) throw new Error("data block end not found");
    return html.slice(0, i + open.length) + "\n" + serialize() + "\n" + html.slice(j);
  }

  async function saveToFile() {
    let htmlOut;
    try { htmlOut = buildHtml(); }
    catch (err) { toast("Save failed: " + err.message); return; }

    if (supportsFS) {
      try {
        if (!fileHandle) {
          fileHandle = await window.showSaveFilePicker({
            suggestedName: "gantt.html",
            types: [{ description: "HTML", accept: { "text/html": [".html"] } }]
          });
        }
        const w = await fileHandle.createWritable();
        await w.write(htmlOut);
        await w.close();
        clearDirty();
        toast("Saved ✓");
      } catch (err) {
        if (err && err.name === "AbortError") return; // user cancelled
        toast("Save error: " + err.message);
      }
    } else {
      downloadHtml(htmlOut);
      clearDirty();
      toast("Downloaded gantt.html — move it to your Dropbox folder");
    }
  }

  function downloadHtml(htmlOut) {
    const blob = new Blob([htmlOut], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "gantt.html";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  // Unified save: cloud when connected (cloud-only mode), else fall back to file/download.
  async function save() {
    if (locked) return; // view-only: nothing to save
    if (cloudConnected() && cloud.binId) return saveToCloud();
    return saveToFile();
  }
  $("save-btn").addEventListener("click", save);

  // Export JSON
  $("export-btn").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "gantt-data.json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  });

  // Import JSON
  $("import-btn").addEventListener("click", () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = "application/json,.json";
    inp.addEventListener("change", () => {
      const f = inp.files[0]; if (!f) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data.tasks) throw new Error("missing tasks");
          state = normalize(data);
          markDirty(); updateViewButtons(); render();
          toast("Imported ✓");
        } catch (err) { toast("Import failed: " + err.message); }
      };
      reader.readAsText(f);
    });
    inp.click();
  });

  // keyboard: Cmd/Ctrl+S
  window.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "s") { e.preventDefault(); save(); }
    if (e.key === "Escape") { closeEditor(); closeGroupEditor(); closeCloud(); }
  });

  // warn before leaving with unsaved changes
  window.addEventListener("beforeunload", (e) => {
    if (dirty) { e.preventDefault(); e.returnValue = ""; }
  });
  // flush any pending batched save when the tab is hidden (switch away / minimize),
  // so the longer autosave window can't lose work
  document.addEventListener("visibilitychange", () => { if (document.hidden && dirty) flushSave(); });

  function markDirty() { dirty = true; document.body.classList.add("dirty"); scheduleCloudSave(); }
  function clearDirty() { dirty = false; document.body.classList.remove("dirty"); }

  // ---------------------------------------------------------------------------
  // JSONBin cloud sync (cloud-only; autosaves on every change)
  // ---------------------------------------------------------------------------
  const JB = "https://api.jsonbin.io/v3";
  const CLOUD_KEY = "gantt_jsonbin_v1";
  const DEFAULT_BIN_ID = "6a38fcb4da38895dfeea6372"; // shared board's bin id (the "address")
  const DEFAULT_REGISTRY_ID = "6a390a19f5f4af5e291c2536"; // bin holding the list of boards [{id,name}]
  const DEFAULT_KEY = "$2a$10$.3MEUB1tMaYhFfPipJG4ROpKN3N1UFZU8uvkcQhSvTf.D5V0165om"; // embedded so the team needs zero setup
  function loadCloud() {
    const def = { apiKey: DEFAULT_KEY, binId: DEFAULT_BIN_ID };
    let merged = def;
    try { merged = Object.assign({}, def, JSON.parse(localStorage.getItem(CLOUD_KEY) || "{}")); } catch (_) {}
    if (!merged.apiKey) merged.apiKey = DEFAULT_KEY;   // fall back to embedded defaults even if a blank was stored
    if (!merged.binId) merged.binId = DEFAULT_BIN_ID;
    return merged;
  }
  function persistCloud() { try { localStorage.setItem(CLOUD_KEY, JSON.stringify(cloud)); } catch (_) {} }
  const cloud = loadCloud();
  let registry = [];         // [{id, name}] list of boards, stored in the registry bin
  let loadedAt = 0;          // updatedAt of the remote version our state descends from
  let baseState = null;      // common ancestor (what the server had at last load/save) for 3-way merge
  let pollTimer = null;      // 5s polling interval
  const POLL_MS = 5000;      // how often to poll the current board for teammates' changes
  const POLL_ENABLED = false; // OFF to conserve JSONBin free-tier requests. Set true to re-enable live polling.
  let suppressAutosave = false;
  let cloudReady = false;    // becomes true only after a successful load/create — gates autosave so a
                             // failed initial load can't overwrite the real bin with local sample data
  function cloudConnected() { return !!cloud.apiKey; }
  function jbHeaders() { return { "X-Master-Key": cloud.apiKey, "Content-Type": "application/json" }; }
  async function jbErr(res) { try { const t = await res.text(); return t || ("HTTP " + res.status); } catch (_) { return "HTTP " + res.status; } }

  // Wrap state with a timestamp so we can detect remote changes; tolerate raw state too.
  function wrap() { return { updatedAt: Date.now(), data: state }; }
  function unwrap(record) {
    if (record && record.data && record.data.tasks) return { data: record.data, updatedAt: record.updatedAt || 0 };
    if (record && record.tasks) return { data: record, updatedAt: 0 }; // legacy: raw state
    return null;
  }

  // GET the current bin; returns {data, updatedAt} or null if the bin is empty/missing.
  async function fetchRemote() {
    const res = await fetch(`${JB}/b/${cloud.binId}/latest`, { headers: jbHeaders() });
    if (res.status === 404) return null;
    if (!res.ok) throw new Error(await jbErr(res));
    const body = await res.json();
    return unwrap(body.record);
  }
  // Re-render after a programmatic state swap without losing the user's scroll position.
  function preserveAndRender() {
    const sl = chartPane.scrollLeft, st = chartPane.scrollTop;
    updateViewButtons(); render();
    chartPane.scrollLeft = sl; chartPane.scrollTop = st;
  }

  async function loadFromCloud() {
    if (!cloudConnected()) { toast("Add your JSONBin key first"); openCloud(); return; }
    if (!cloud.binId) { toast("Set a bin id first"); openCloud(); return; }
    setSync("syncing"); setCloudStatus("Loading bin " + cloud.binId + " …", "");
    try {
      const u = await fetchRemote();
      if (!u) { // empty bin — nothing to load yet
        baseState = clone(state); loadedAt = 0; cloudReady = true;
        setSync("ok"); setCloudStatus("Empty bin — edits will populate it.", ""); return;
      }
      suppressAutosave = true;
      state = normalize(u.data);
      loadedAt = u.updatedAt;
      baseState = clone(state);
      clearDirty(); updateViewButtons(); render();
      suppressAutosave = false;
      cloudReady = true;
      setSync("ok"); setCloudStatus("Loaded bin " + cloud.binId, "ok");
      toast("Loaded from cloud ✓");
    } catch (err) {
      setSync("err"); setCloudStatus("Load failed: " + err.message, "err");
      toast("Cloud load failed: " + err.message);
      render(); // show whatever we have so the board isn't stuck behind the loading veil
    }
  }

  // Save the whole board. Polls latest first and 3-way-merges so teammates' edits
  // to other items aren't lost. Used by autosave (debounced) and "Save now".
  let savePromise = null, saveAgain = false;
  async function saveToCloud() {
    if (!cloudConnected() || !cloud.binId) return;
    if (savePromise) { saveAgain = true; return savePromise; } // coalesce overlapping saves
    setSync("syncing");
    savePromise = (async () => {
      try {
        // poll-before-write: fold in any remote changes since we loaded
        let remote = null;
        try { remote = await fetchRemote(); } catch (_) {}
        if (remote && remote.updatedAt && remote.updatedAt !== loadedAt) {
          const merged = merge3(baseState || remote.data, state, remote.data);
          suppressAutosave = true;
          state = normalize(merged);
          preserveAndRender();
          suppressAutosave = false;
        }
        const payload = { updatedAt: Date.now(), data: state };
        const res = await fetch(`${JB}/b/${cloud.binId}`, { method: "PUT", headers: jbHeaders(), body: JSON.stringify(payload) });
        if (!res.ok) throw new Error(await jbErr(res));
        loadedAt = payload.updatedAt;
        baseState = clone(state);
        clearDirty();
        setSync("ok"); setCloudStatus("Saved to bin " + cloud.binId, "ok");
      } catch (err) {
        setSync("err"); setCloudStatus("Save failed: " + err.message, "err");
        toast("Cloud save failed: " + err.message);
      }
    })();
    await savePromise;
    savePromise = null;
    if (saveAgain) { saveAgain = false; return saveToCloud(); } // flush edits made mid-save
  }

  // Batched autosave: wait for a pause in editing (idle), but never hold edits
  // longer than the max cap. This collapses a burst of edits into one save to
  // conserve API requests, while flush-on-hide keeps it safe.
  const SAVE_IDLE_MS = 2500;   // save this long after the last edit
  const SAVE_MAX_MS = 15000;   // ...but force a save at least this often during continuous editing
  let autosaveTimer = null, firstDirtyAt = 0;
  function scheduleCloudSave() {
    if (!cloudConnected() || !cloud.binId || suppressAutosave || !cloudReady || locked) return;
    setSync("pending");
    const now = Date.now();
    if (!firstDirtyAt) firstDirtyAt = now;
    const wait = Math.min(SAVE_IDLE_MS, Math.max(0, SAVE_MAX_MS - (now - firstDirtyAt)));
    clearTimeout(autosaveTimer);
    autosaveTimer = setTimeout(flushSave, wait);
  }
  function flushSave() {
    clearTimeout(autosaveTimer); autosaveTimer = null; firstDirtyAt = 0;
    if (dirty) saveToCloud();
  }

  // --- pull teammates' changes (shared by polling and the manual Refresh button) ---
  function startPolling() { if (POLL_ENABLED && !pollTimer) pollTimer = setInterval(pollTick, POLL_MS); }
  function uiBusy() { return dragging || !!document.querySelector(".overlay.show"); }
  // Returns true if something new was pulled in.
  async function syncFromRemote() {
    const remote = await fetchRemote();
    if (!remote || !remote.updatedAt || remote.updatedAt <= loadedAt) return false; // nothing new
    if (dirty) {
      // we have local edits — merge remote in, then let autosave push the result
      const merged = merge3(baseState || remote.data, state, remote.data);
      suppressAutosave = true; state = normalize(merged); preserveAndRender(); suppressAutosave = false;
      baseState = clone(state); loadedAt = remote.updatedAt;
      scheduleCloudSave();
    } else {
      // clean — just adopt the remote version
      suppressAutosave = true; state = normalize(remote.data); preserveAndRender(); suppressAutosave = false;
      baseState = clone(state); loadedAt = remote.updatedAt; cloudReady = true;
      setSync("ok");
    }
    return true;
  }
  async function pollTick() {
    if (!cloudConnected() || !cloud.binId || !cloudReady) return;
    if (document.hidden || uiBusy() || savePromise) return; // don't disturb active work / save
    try { await syncFromRemote(); } catch (_) { /* transient; try again next tick */ }
  }
  // Manual one-shot refresh (one GET). Bound to the 🔄 toolbar button.
  async function refreshNow() {
    if (!cloudConnected() || !cloud.binId) { toast("Cloud not configured"); return; }
    if (uiBusy()) { toast("Finish your current edit first"); return; }
    setSync("syncing");
    try {
      const changed = await syncFromRemote();
      setSync("ok");
      toast(changed ? "Refreshed ✓" : "Already up to date");
    } catch (err) { setSync("err"); toast("Refresh failed: " + err.message); }
  }

  // --- 3-way merge (base = common ancestor, local = ours, remote = theirs) ---
  function clone(o) { return JSON.parse(JSON.stringify(o)); }
  function eq(a, b) { return JSON.stringify(a) === JSON.stringify(b); }
  function merge3(base, local, remote) {
    base = base || { groups: [], tasks: [], settings: {} };
    return {
      version: 1,
      settings: mergeFields(base.settings || {}, local.settings || {}, remote.settings || {}),
      groups: mergeList(base.groups || [], local.groups || [], remote.groups || []),
      tasks: mergeList(base.tasks || [], local.tasks || [], remote.tasks || [])
    };
  }
  function byId(arr) { const m = {}; for (const x of arr) m[x.id] = x; return m; }
  function mergeFields(b, l, r) {
    const out = clone(l); const keys = new Set([...Object.keys(l), ...Object.keys(r)]);
    for (const k of keys) {
      const lc = !eq(b ? b[k] : undefined, l[k]);
      const rc = !eq(b ? b[k] : undefined, r[k]);
      if (rc && !lc) out[k] = clone(r[k]); // remote changed this field, we didn't → take theirs
      // otherwise keep local (covers we-changed and both-changed → ours wins)
    }
    return out;
  }
  function mergeList(base, local, remote) {
    const b = byId(base), l = byId(local), r = byId(remote);
    function resolve(id) {
      const inB = id in b, inL = id in l, inR = id in r;
      if (inL && inR) {
        if (!inB) return clone(l);                 // both added → ours
        const lc = !eq(b[id], l[id]), rc = !eq(b[id], r[id]);
        if (lc && !rc) return clone(l[id]);
        if (rc && !lc) return clone(r[id]);
        if (!lc && !rc) return clone(l[id]);
        return mergeFields(b[id], l[id], r[id]);   // both changed → field-level, ours wins ties
      }
      if (inB && !inL && inR) return eq(b[id], r[id]) ? undefined : clone(r[id]); // we deleted; keep only if they changed it
      if (inB && inL && !inR) return eq(b[id], l[id]) ? undefined : clone(l[id]); // they deleted; keep only if we changed it
      if (!inB && inL) return clone(l[id]);         // we added
      if (!inB && inR) return clone(r[id]);         // they added
      return undefined;
    }
    const out = [], seen = new Set();
    for (const x of local) { if (seen.has(x.id)) continue; seen.add(x.id); const v = resolve(x.id); if (v) out.push(v); }
    for (const x of remote) { if (seen.has(x.id)) continue; seen.add(x.id); const v = resolve(x.id); if (v) out.push(v); }
    return out;
  }

  // --- board registry (list of boards lives in its own bin) ---
  async function loadRegistry() {
    if (!cloudConnected() || !DEFAULT_REGISTRY_ID) return;
    try {
      const res = await fetch(`${JB}/b/${DEFAULT_REGISTRY_ID}/latest`, { headers: jbHeaders() });
      if (!res.ok) throw new Error(await jbErr(res));
      const body = await res.json();
      registry = (body.record && Array.isArray(body.record.boards)) ? body.record.boards : [];
    } catch (err) {
      console.warn("registry load failed:", err.message);
    }
    renderBoardSelect();
  }
  async function saveRegistry() {
    const res = await fetch(`${JB}/b/${DEFAULT_REGISTRY_ID}`, { method: "PUT", headers: jbHeaders(), body: JSON.stringify({ boards: registry }) });
    if (!res.ok) throw new Error(await jbErr(res));
  }
  async function createBoardBin(name, data) {
    const res = await fetch(`${JB}/b`, {
      method: "POST",
      headers: Object.assign(jbHeaders(), { "X-Bin-Name": ("gantt-" + name).slice(0, 120), "X-Bin-Private": "true" }),
      body: JSON.stringify({ updatedAt: Date.now(), data })
    });
    if (!res.ok) throw new Error(await jbErr(res));
    const body = await res.json();
    const id = body.metadata && body.metadata.id;
    if (!id) throw new Error("no bin id returned");
    return id;
  }

  function renderBoardSelect() {
    const sel = $("board-select");
    if (!sel) return;
    sel.innerHTML = registry.map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join("");
    if (cloud.binId && !registry.some(b => b.id === cloud.binId)) {
      const o = document.createElement("option"); o.value = cloud.binId; o.textContent = "(current)"; sel.appendChild(o);
    }
    sel.value = cloud.binId || "";
  }

  async function switchBoard(id) {
    if (!id || id === cloud.binId) return;
    cloud.binId = id; persistCloud();
    cloudReady = false;
    renderBoardSelect();
    $("loading").classList.add("show");
    await loadFromCloud();
    $("loading").classList.remove("show");
  }

  async function newBoard() {
    if (!cloudConnected()) { toast("Cloud not configured"); return; }
    const name = (prompt("Name for the new board:", "New board") || "").trim();
    if (!name) return;
    setSync("syncing"); setCloudStatus("Creating board…", "");
    $("loading").classList.add("show");
    try {
      const empty = { version: 1, settings: { viewMode: state.settings.viewMode || "week" }, groups: [], tasks: [] };
      const id = await createBoardBin(name, empty);
      registry.push({ id, name });
      await saveRegistry();
      cloud.binId = id; persistCloud();
      cloudReady = false;
      renderBoardSelect();
      await loadFromCloud(); // pulls the (empty) board and arms autosave
      toast("Board “" + name + "” created ✓");
    } catch (err) {
      setSync("err"); setCloudStatus("Create failed: " + err.message, "err");
      toast("Create board failed: " + err.message);
    } finally {
      $("loading").classList.remove("show");
    }
  }

  async function renameBoard() {
    if (!registry.length) { toast("No boards to rename"); return; }
    const entry = registry.find(b => b.id === cloud.binId);
    const name = (prompt("Rename board:", entry ? entry.name : "") || "").trim();
    if (!name) return;
    if (entry) entry.name = name; else registry.push({ id: cloud.binId, name });
    try { await saveRegistry(); renderBoardSelect(); toast("Renamed ✓"); }
    catch (err) { toast("Rename failed: " + err.message); }
  }

  async function deleteBoard() {
    if (registry.length <= 1) { toast("Can't delete the only board"); return; }
    const entry = registry.find(b => b.id === cloud.binId);
    if (!confirm("Delete board “" + (entry ? entry.name : cloud.binId) + "”?\nThis removes it from the list and deletes its data.")) return;
    const delId = cloud.binId;
    registry = registry.filter(b => b.id !== delId);
    try {
      await saveRegistry();
      try { await fetch(`${JB}/b/${delId}`, { method: "DELETE", headers: jbHeaders() }); } catch (_) {}
      cloud.binId = registry[0].id; persistCloud();
      cloudReady = false;
      renderBoardSelect();
      $("loading").classList.add("show");
      await loadFromCloud();
      $("loading").classList.remove("show");
      toast("Board deleted");
    } catch (err) { toast("Delete failed: " + err.message); }
  }

  // --- cloud UI ---
  function setCloudStatus(msg, kind) { const el = $("c-status"); el.textContent = msg; el.className = "c-status" + (kind ? (" " + kind) : ""); }
  const cloudDot = document.querySelector("#cloud-btn .cloud-dot");
  function setSync(s) {
    // dot color: grey idle, amber pending/syncing, green ok, red error
    const c = { idle: "#cbd2dd", pending: "#f59e0b", syncing: "#f59e0b", ok: "#10b981", err: "#ef4444" }[s] || "#cbd2dd";
    if (cloudDot) cloudDot.style.background = c;
    $("cloud-btn").title = "Cloud: " + s;
  }
  function updateCloudUI() {
    const conn = cloudConnected();
    document.body.classList.toggle("cloud-on", conn);
    if (conn) { setCloudStatus("Key set · bin " + (cloud.binId || "(none)"), "ok"); setSync("ok"); }
    else { setCloudStatus("No key yet — paste a JSONBin access key to sync.", ""); setSync("idle"); }
  }
  function openCloud() { $("c-binid").value = cloud.binId || ""; updateCloudUI(); $("cloud-overlay").classList.add("show"); }
  function closeCloud() { $("cloud-overlay").classList.remove("show"); }

  $("cloud-btn").addEventListener("click", openCloud);
  $("c-close").addEventListener("click", closeCloud);
  $("cloud-overlay").addEventListener("click", (e) => { if (e.target === $("cloud-overlay")) closeCloud(); });
  $("c-binid").addEventListener("change", () => { cloud.binId = $("c-binid").value.trim(); persistCloud(); updateCloudUI(); });
  $("c-load").addEventListener("click", () => { const id = $("c-binid").value.trim(); if (id === cloud.binId) loadFromCloud(); else switchBoard(id); });
  $("c-savenow").addEventListener("click", () => { saveToCloud(); });
  $("c-create").addEventListener("click", () => { newBoard(); });
  $("c-rename").addEventListener("click", () => { renameBoard(); });
  $("c-delete").addEventListener("click", () => { deleteBoard(); });
  // toolbar board switcher
  $("board-select").addEventListener("change", (e) => { switchBoard(e.target.value); });
  $("board-new").addEventListener("click", () => { newBoard(); });
  $("refresh-btn").addEventListener("click", () => { refreshNow(); });

  // ---------------------------------------------------------------------------
  // Data load / normalize
  // ---------------------------------------------------------------------------
  function loadState() {
    try {
      const raw = document.getElementById("gantt-data").textContent.trim();
      return normalize(JSON.parse(raw));
    } catch (e) {
      return normalize({ version: 1, settings: { viewMode: "week" }, groups: [], tasks: [] });
    }
  }
  function normalize(data) {
    const s = {
      version: 1,
      settings: { viewMode: (data.settings && data.settings.viewMode) || "week" },
      groups: Array.isArray(data.groups) ? data.groups : [],
      tasks: Array.isArray(data.tasks) ? data.tasks : []
    };
    if (!VIEW[s.settings.viewMode]) s.settings.viewMode = "week";
    s.tasks.forEach(t => {
      t.deps = Array.isArray(t.deps) ? t.deps : [];
      t.progress = typeof t.progress === "number" ? t.progress : 0;
      t.isMilestone = !!t.isMilestone;
      if (!t.end) t.end = t.start;
      if (!t.id) t.id = uid("t");
    });
    return s;
  }

  // ---------------------------------------------------------------------------
  // Misc utils
  // ---------------------------------------------------------------------------
  let _counter = 0;
  function uid(prefix) { return prefix + Date.now().toString(36) + (_counter++).toString(36); }
  function esc(s) { return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function fmtShort(dt) { return `${dt.getDate()} ${MONTHS[dt.getMonth()]}`; }
  const COLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316"];
  function pickColor() { return COLORS[state.groups.length % COLORS.length]; }

  let toastTimer = null;
  function toast(msg, actionLabel, actionFn) {
    const t = $("toast");
    t.innerHTML = "";
    t.appendChild(document.createTextNode(msg));
    if (actionLabel && actionFn) {
      const b = document.createElement("button");
      b.className = "toast-btn"; b.textContent = actionLabel;
      b.addEventListener("click", () => { actionFn(); t.classList.remove("show"); });
      t.appendChild(b);
    }
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), actionLabel ? 6000 : 2600);
  }
  function snapshot() { return JSON.parse(JSON.stringify(state)); }
  function restoreState(snap) { state = snap; markDirty(); updateViewButtons(); render(); }

  // ---------------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------------
  function init() {
    if (!supportsFS && !cloudConnected()) {
      const b = $("save-mode-banner");
      if (location.protocol === "file:") {
        // Chrome/Edge DO support in-place save, but the browser blocks the API on file:// pages.
        b.innerHTML = '⚠️ <b>In-place saving is disabled because this page was opened directly from a file</b> ' +
          '(<code>file://</code>). For now, <b>Save</b> downloads an updated copy. ' +
          'To save back into the same file, open it via <code>http://localhost</code> in Chrome/Edge — ' +
          'just double-click <code>serve.command</code> in this folder (see README).';
      } else {
        b.textContent = "This browser doesn't support writing files in place. \"Save\" downloads a fresh gantt.html that you drop into your shared folder. For in-place saving, open it in Chrome or Edge.";
      }
      b.classList.add("show");
    }
    renderSwatches();
    applyLockUI(); // start in view-only mode
    updateCloudUI();
    updateViewButtons();
    if (cloudConnected()) {
      // cloud-only: keep the loading veil up and don't render the embedded sample —
      // render only once the cloud responds, so there's no flash of default data.
      initCloud().finally(() => { $("loading").classList.remove("show"); scrollToToday(); });
    } else {
      $("loading").classList.remove("show");
      render();
      scrollToToday();
    }
  }
  async function initCloud() {
    await loadRegistry(); // populates `registry` + the board dropdown
    // Restore the last board (remembered in localStorage). If it's missing/deleted,
    // fall back to the first board in the registry.
    if (registry.length && !registry.some(b => b.id === cloud.binId)) {
      cloud.binId = registry[0].id; persistCloud(); renderBoardSelect();
    }
    if (cloud.binId) await loadFromCloud();
    else render();
    startPolling(); // begin 5s team-sync polling once the board is loaded
  }
  function scrollToToday() {
    requestAnimationFrame(() => {
      const x = dateToX(today());
      chartPane.scrollLeft = Math.max(0, x - chartPane.clientWidth / 2);
    });
  }

  // ---------------------------------------------------------------------------
  // Theme toggle (dark cyberpunk <-> clean light), remembered in localStorage.
  // The <head> script already applied the saved theme before paint; here we
  // just sync the button label and handle clicks.
  // ---------------------------------------------------------------------------
  const THEME_KEY = "gantt_theme_v1";
  function currentTheme() { return document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark"; }
  function applyTheme(t) {
    if (t === "light") document.documentElement.setAttribute("data-theme", "light");
    else document.documentElement.removeAttribute("data-theme");
    $("theme-btn").textContent = t === "light" ? "☀" : "🌙";
    $("theme-btn").title = t === "light" ? "Switch to dark (hacker) theme" : "Switch to light theme";
    try { localStorage.setItem(THEME_KEY, t); } catch (_) {}
  }
  $("theme-btn").addEventListener("click", () => applyTheme(currentTheme() === "light" ? "dark" : "light"));
  applyTheme(currentTheme()); // sync the button to whatever the <head> script set

  init();
})();
</script>
</body>
</html>
